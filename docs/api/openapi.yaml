    LegwearSpec:
      type: object
      description: legwear category の lower-body preview 補正情報。`socks` / `leggings` は create / update で `coverage_type` 必須、`tights` / `stockings` は今回の必須化対象外で固定値補完を許容する。描画側では欠落 / 判定不能を full-length legwear 表現として扱う。
      properties:
        coverage_type:
          type: string
          description: legwear category の item で使う詳細分類。shape は粗い分類、coverage_type は詳細分類の正本。shape ごとに許可される値があり、`socks` / `leggings` では必須、`tights` / `stockings` は固定値補完を許容する。
          enum:
            - ankle_socks
            - crew_socks
            - knee_socks
            - over_knee
            - stockings
            - tights
            - leggings_cropped
            - leggings_full

