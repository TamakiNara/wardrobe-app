openapi: 3.0.3

info:
  title: Wardrobe App API
  version: 0.1.0
  description: |
    Wardrobe App のAPI仕様。

    このAPIは Cookie ベースのセッション認証を使用する。
    CSRF 保護が必要な POST / PUT / DELETE では `X-CSRF-TOKEN` ヘッダが必要。
    docs 上では認証系 API / 設定系 API / 参照マスタ API を軸に整理しつつ、Items / Outfits も実装単位で記載する。

servers:
  - url: http://localhost:8000
    description: ローカル開発環境

tags:
  - name: Auth
    description: 認証・セッション関連 API
  - name: ReferenceMasters
    description: 参照マスタ API
  - name: Settings
    description: 設定関連 API
  - name: Items
    description: アイテム関連 API
  - name: Outfits
    description: コーディネート関連 API
  - name: Wear Logs
    description: wear logs 関連 API

paths:
  /csrf-cookie:
    get:
      tags:
        - Auth
      summary: CSRFトークンとセッションCookieを発行する
      description: |
        CSRF保護が必要な API を呼ぶ前に実行する。
        XSRF-TOKEN とセッションCookie を Cookie に設定する。
      operationId: getCsrfCookie
      responses:
        '204':
          description: レスポンスボディなし
          headers:
            Set-Cookie:
              description: "XSRF-TOKEN とセッションCookie が設定される"
              schema:
                type: string

  /api/register:
    post:
      tags:
        - Auth
      summary: ユーザー登録
      description: |
        新規ユーザーを登録し、成功時はそのままログイン状態にする。
        Cookie ベース認証のため、事前に `/csrf-cookie` を呼び出し `X-CSRF-TOKEN` を付与する。
      operationId: register
      parameters:
        - $ref: '#/components/parameters/XCsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: ユーザー登録成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '422':
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/login:
    post:
      tags:
        - Auth
      summary: ログイン
      description: |
        メールアドレスとパスワードでログインする。
        Cookie ベース認証のため、事前に `/csrf-cookie` を呼び出し `X-CSRF-TOKEN` を付与する。
      operationId: login
      parameters:
        - $ref: '#/components/parameters/XCsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: ログイン成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '422':
          description: 認証失敗またはバリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/me:
    get:
      tags:
        - Auth
      summary: ログインユーザー情報取得
      operationId: me
      security:
        - SessionCookieAuth: []
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: 未認証

  /api/logout:
    post:
      tags:
        - Auth
      summary: ログアウト
      description: |
        ルート定義は `auth:web` 配下に置くが、未認証で `/api/logout` を呼んだ場合も例外ハンドラ側で `logged_out` を返す。
        POST のため `X-CSRF-TOKEN` ヘッダが必要。
      operationId: logout
      parameters:
        - $ref: '#/components/parameters/XCsrfTokenHeader'
      responses:
        '200':
          description: ログアウト成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageOnlyResponse'

  /api/categories:
    get:
      tags:
        - ReferenceMasters
      summary: カテゴリ一覧取得
      description: 参照マスタとしてカテゴリ一覧を返す。実装は `api/routes/api.php` 側に定義されている。
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoriesResponse'

  /api/settings/categories:
    get:
      tags:
        - Settings
      summary: カテゴリ表示設定取得
      security:
        - SessionCookieAuth: []
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryVisibilitySettingsResponse'
        '401':
          description: 未認証
    put:
      tags:
        - Settings
      summary: カテゴリ表示設定更新
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/XCsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCategoryVisibilitySettingsRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryVisibilitySettingsUpdatedResponse'
        '401':
          description: 未認証
        '422':
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/items:
    get:
      tags:
        - Items
      summary: アイテム一覧取得
      description: |
        実装済みのアイテム一覧取得 API。

        通常一覧に表示する `status=active` の item を返す。
        response 形式は `items` 配列と `meta.total` / `meta.totalAll` /
        `meta.page` / `meta.lastPage` を含む。
      security:
        - SessionCookieAuth: []
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemsResponse'
        '401':
          description: 未認証
    post:
      tags:
        - Items
      summary: アイテム作成
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/XCsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemUpsertRequest'
      responses:
        '201':
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponseWithMessage'
        '401':
          description: 未認証
        '422':
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/items/{id}:
    get:
      tags:
        - Items
      summary: アイテム詳細取得
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/ItemIdPath'
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'
        '401':
          description: 未認証
        '404':
          description: 未検出
    put:
      tags:
        - Items
      summary: アイテム更新
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/ItemIdPath'
        - $ref: '#/components/parameters/XCsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemUpsertRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponseWithMessage'
        '401':
          description: 未認証
        '404':
          description: 未検出
        '422':
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
    delete:
      tags:
        - Items
      summary: アイテム削除
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/ItemIdPath'
        - $ref: '#/components/parameters/XCsrfTokenHeader'
      responses:
        '200':
          description: 削除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageOnlyResponse'
        '401':
          description: 未認証
        '404':
          description: 未検出

  /api/items/{id}/dispose:
    post:
      tags:
        - Items
      summary: アイテムを disposed に変更
      description: |
        実装済みの item status 変更 API。

        item を `disposed` に変更し、「手放した / 現在所持していない」状態へ遷移させる。
        通常の `ItemUpsertRequest` とは分けて扱う。
        関連する `active` outfit がある場合は、それらを `invalid` にする副作用を伴う。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/ItemIdPath'
        - $ref: '#/components/parameters/XCsrfTokenHeader'
      responses:
        '200':
          description: 変更成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponseWithMessage'
        '401':
          description: 未認証
        '404':
          description: 未検出
        '422':
          description: 変更不可またはバリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/items/{id}/reactivate:
    post:
      tags:
        - Items
      summary: アイテムを active に戻す
      description: |
        実装済みの item status 変更 API。

        item を `active` に戻すが、関連 outfit は自動 `restore` しない。
        通常の `ItemUpsertRequest` とは分けて扱う。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/ItemIdPath'
        - $ref: '#/components/parameters/XCsrfTokenHeader'
      responses:
        '200':
          description: 変更成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponseWithMessage'
        '401':
          description: 未認証
        '404':
          description: 未検出
        '422':
          description: 変更不可またはバリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/outfits:
    get:
      tags:
        - Outfits
      summary: コーディネート一覧取得
      description: |
        実装済みのコーディネート一覧取得 API。

        通常一覧に表示する `status=active` の outfit を返す。
        response 形式は `outfits` 配列と `meta.total` / `meta.totalAll` /
        `meta.page` / `meta.lastPage` を含む。
      security:
        - SessionCookieAuth: []
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutfitsResponse'
        '401':
          description: 未認証
    post:
      tags:
        - Outfits
      summary: コーディネート作成
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/XCsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OutfitUpsertRequest'
      responses:
        '201':
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutfitResponseWithMessage'
        '401':
          description: 未認証
        '422':
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/outfits/{id}:
    get:
      tags:
        - Outfits
      summary: コーディネート詳細取得
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/OutfitIdPath'
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutfitResponse'
        '401':
          description: 未認証
        '404':
          description: 未検出
    put:
      tags:
        - Outfits
      summary: コーディネート更新
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/OutfitIdPath'
        - $ref: '#/components/parameters/XCsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OutfitUpsertRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutfitResponseWithMessage'
        '401':
          description: 未認証
        '404':
          description: 未検出
        '422':
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
    delete:
      tags:
        - Outfits
      summary: コーディネート削除
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/OutfitIdPath'
        - $ref: '#/components/parameters/XCsrfTokenHeader'
      responses:
        '200':
          description: 削除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageOnlyResponse'
        '401':
          description: 未認証
        '404':
          description: 未検出

  /api/outfits/invalid:
    get:
      tags:
        - Outfits
      summary: invalid コーディネート一覧取得
      description: |
        実装済みの invalid outfit 一覧取得 API。

        通常一覧には出さない `status=invalid` の outfit を返す。
        response 形式は通常一覧と同じ `OutfitsResponse` を使い、
        `meta.page` / `meta.lastPage` / `meta.total` / `meta.totalAll` を返す。
      security:
        - SessionCookieAuth: []
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutfitsResponse'
        '401':
          description: 未認証

  /api/outfits/{id}/restore:
    post:
      tags:
        - Outfits
      summary: invalid コーディネート手動復帰
      description: |
        実装済みの invalid outfit 手動復帰 API。

        対象 outfit が `invalid` で、構成 item がすべて `active` の場合のみ
        `status=active` へ復帰できる。
        item や `outfit_items` 自体は書き換えない。
        主な利用箇所は invalid outfit 一覧または詳細画面の補助導線を想定する。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/OutfitIdPath'
        - $ref: '#/components/parameters/XCsrfTokenHeader'
      responses:
        '200':
          description: 復帰成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutfitResponseWithMessage'
        '401':
          description: 未認証
        '404':
          description: 未検出
        '422':
          description: 復帰不可またはバリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/outfits/{id}/duplicate:
    post:
      tags:
        - Outfits
      summary: コーディネート複製
      description: |
        実装済みの outfit 複製用 API。

        active / invalid を問わず複製可能とする。
        invalid outfit の場合は再利用導線として特に重要とし、
        disposed item は通常選択状態にしない形で初期値生成する。
        response の `outfit` は保存済み record ではなく、
        新規作成画面へ渡す初期値 payload を返す。
        `items[*].selectable=false` と `note` により、
        現在は使えない item を補助表示できる。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/OutfitIdPath'
        - $ref: '#/components/parameters/XCsrfTokenHeader'
      responses:
        '200':
          description: 複製用初期値取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutfitDuplicateResponse'
        '401':
          description: 未認証
        '404':
          description: 未検出

  /api/wear-logs:
    get:
      tags:
        - Wear Logs
      summary: wear logs 一覧取得
      description: |
        実装済みの wear logs 一覧取得 API。
        `event_date desc, display_order asc` を初期並び順とし、
        `meta.total / totalAll / page / lastPage` を返す。
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: keyword
          in: query
          required: false
          schema:
            type: string
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [date_desc, date_asc]
            default: date_desc
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [planned, worn]
        - name: date_from
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: wear logs 一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WearLogsResponse'
        '401':
          description: 未認証

    post:
      tags:
        - Wear Logs
      summary: wear log 作成
      description: |
        実装済みの wear log 作成 API。
        `source_outfit_id` のみ、`items` のみ、両方指定のいずれも許可する。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WearLogUpsertRequest'
      responses:
        '201':
          description: wear log 作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WearLogMutationResponse'
        '401':
          description: 未認証
        '422':
          description: バリデーションエラー
  /api/wear-logs/{wearLogId}:
    get:
      tags:
        - Wear Logs
      summary: wear log 詳細取得
      description: 実装済みの wear log 詳細取得 API。
      parameters:
        - name: wearLogId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: wear log 詳細
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WearLogResponse'
        '401':
          description: 未認証
        '404':
          description: 対象データなし

    put:
      tags:
        - Wear Logs
      summary: wear log 更新
      description: |
        実装済みの wear log 更新 API。
        既存レコードに含まれる現在候補外の item / outfit は、
        同一 record の再保存に限り保持できる。
      parameters:
        - name: wearLogId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WearLogUpsertRequest'
      responses:
        '200':
          description: wear log 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WearLogMutationResponse'
        '401':
          description: 未認証
        '404':
          description: 対象データなし
        '422':
          description: バリデーションエラー

    delete:
      tags:
        - Wear Logs
      summary: wear log 削除
      description: |
        wear log 削除用の future API 設計です。
        現時点では未実装です。
      parameters:
        - name: wearLogId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: wear log 削除成功（未実装）
        '401':
          description: 未認証
        '404':
          description: 対象データなし


components:
  parameters:
    XCsrfTokenHeader:
      name: X-CSRF-TOKEN
      in: header
      required: false
      description: |
        CSRF対策用ヘッダ。
        `/csrf-cookie` 実行後に取得した `XSRF-TOKEN` と同じ値を指定する。
        実運用では必須。
        Swagger UI では requestInterceptor により自動付与する。
      schema:
        type: string
    ItemIdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    OutfitIdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1

  schemas:
    User:
      type: object
      required:
        - id
        - name
        - email
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          maxLength: 50
          example: Test
        email:
          type: string
          format: email
          maxLength: 255
          example: sample.user@gmail.com

    RegisterRequest:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
          maxLength: 50
          example: Test
        email:
          type: string
          format: email
          maxLength: 255
          example: sample.user@gmail.com
        password:
          type: string
          minLength: 8
          maxLength: 72
          example: password123

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          maxLength: 255
          example: sample.user@gmail.com
        password:
          type: string
          minLength: 8
          maxLength: 72
          example: password123

    RegisterResponse:
      type: object
      required:
        - message
        - user
      properties:
        message:
          type: string
          example: registered
        user:
          $ref: '#/components/schemas/User'

    LoginResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: logged_in

    MessageOnlyResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: logged_out

    ValidationErrorResponse:
      type: object
      required:
        - message
        - errors
      properties:
        message:
          type: string
          example: The given data was invalid.
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    CategoriesResponse:
      type: object
      required:
        - groups
      properties:
        groups:
          type: array
          items:
            $ref: '#/components/schemas/CategoryGroup'

    CategoryGroup:
      type: object
      required:
        - id
        - name
        - categories
      properties:
        id:
          type: string
          example: tops
        name:
          type: string
          example: トップス
        categories:
          type: array
          items:
            $ref: '#/components/schemas/Category'

    Category:
      type: object
      required:
        - id
        - groupId
        - name
      properties:
        id:
          type: string
          example: tops_tshirt
        groupId:
          type: string
          example: tops
        name:
          type: string
          example: Tシャツ

    CategoryVisibilitySettingsResponse:
      type: object
      required:
        - visibleCategoryIds
      properties:
        visibleCategoryIds:
          type: array
          items:
            type: string
          example:
            - tops_tshirt
            - bottoms_denim_pants

    UpdateCategoryVisibilitySettingsRequest:
      type: object
      required:
        - visibleCategoryIds
      properties:
        visibleCategoryIds:
          type: array
          items:
            type: string
          example:
            - tops_tshirt
            - bottoms_denim_pants

    CategoryVisibilitySettingsUpdatedResponse:
      allOf:
        - $ref: '#/components/schemas/MessageOnlyResponse'
        - type: object
          required:
            - visibleCategoryIds
          properties:
            visibleCategoryIds:
              type: array
              items:
                type: string

    ItemColor:
      type: object
      required:
        - role
        - mode
        - value
        - hex
        - label
      properties:
        role:
          type: string
          enum: [main, sub]
        mode:
          type: string
          enum: [preset, custom]
        value:
          type: string
          example: navy
        hex:
          type: string
          example: '#1f3a5f'
        label:
          type: string
          example: ネイビー

    TopsSpec:
      type: object
      properties:
        shape:
          type: string
        sleeve:
          type: string
        length:
          type: string
        neck:
          type: string
        design:
          type: string
        fit:
          type: string

    ItemSpec:
      type: object
      properties:
        tops:
          $ref: '#/components/schemas/TopsSpec'
      additionalProperties: true

    ItemRecord:
      type: object
      required:
        - id
        - user_id
        - status
        - category
        - shape
        - colors
        - seasons
        - tpos
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          example: 1
        user_id:
          type: integer
          example: 1
        status:
          type: string
          enum:
            - active
            - disposed
          example: active
        name:
          type: string
          nullable: true
          example: ネイビーTシャツ
        category:
          type: string
          example: tops_tshirt
        shape:
          type: string
          example: crew_neck_tshirt
        colors:
          type: array
          items:
            $ref: '#/components/schemas/ItemColor'
        seasons:
          type: array
          items:
            type: string
        tpos:
          type: array
          items:
            type: string
        spec:
          allOf:
            - $ref: '#/components/schemas/ItemSpec'
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ItemUpsertRequest:
      type: object
      description: |
        Item の通常作成 / 更新 request。
        通常の作成 / 更新 payload に status は含めない。
        status は内部状態として管理し、disposed への変更は別導線で扱う想定とする。

        disposed は「手放した / 現在所持していない」状態を表す。
        disposed 変更時は、関連 outfit の invalid 化など副作用を伴うため、
        通常の項目更新とは分けて扱う前提とする。
      required:
        - category
        - shape
        - colors
      properties:
        name:
          type: string
          nullable: true
          maxLength: 255
        category:
          type: string
          maxLength: 100
        shape:
          type: string
          maxLength: 100
        colors:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ItemColor'
        seasons:
          type: array
          items:
            type: string
        tpos:
          type: array
          items:
            type: string
        spec:
          $ref: '#/components/schemas/ItemSpec'

    ItemsResponse:
      type: object
      description: |
        アイテム一覧 response。
        現在の実装では `items` 配列に加えて、
        `meta.total` / `meta.totalAll` / `meta.page` / `meta.lastPage` を返す。
      required:
        - items
        - meta
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ItemRecord'
        meta:
          type: object
          required:
            - total
            - totalAll
            - page
            - lastPage
          properties:
            total:
              type: integer
              example: 12
            totalAll:
              type: integer
              example: 12
            page:
              type: integer
              example: 1
            lastPage:
              type: integer
              example: 2

    ItemResponse:
      type: object
      required:
        - item
      properties:
        item:
          $ref: '#/components/schemas/ItemRecord'

    ItemResponseWithMessage:
      allOf:
        - $ref: '#/components/schemas/MessageOnlyResponse'
        - type: object
          required:
            - item
          properties:
            item:
              $ref: '#/components/schemas/ItemRecord'

    OutfitItemPivotRecord:
      type: object
      required:
        - id
        - outfit_id
        - item_id
        - sort_order
      properties:
        id:
          type: integer
          example: 10
        outfit_id:
          type: integer
          example: 2
        item_id:
          type: integer
          example: 1
        sort_order:
          type: integer
          minimum: 1
          example: 1
        item:
          $ref: '#/components/schemas/ItemRecord'

    OutfitRecord:
      type: object
      required:
        - id
        - user_id
        - status
        - seasons
        - tpos
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          example: 1
        user_id:
          type: integer
          example: 1
        status:
          type: string
          enum:
            - active
            - invalid
          example: active
        name:
          type: string
          nullable: true
          example: 週末カジュアル
        memo:
          type: string
          nullable: true
        seasons:
          type: array
          items:
            type: string
        tpos:
          type: array
          items:
            type: string
        outfit_items:
          type: array
          items:
            $ref: '#/components/schemas/OutfitItemPivotRecord'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    OutfitItemInput:
      type: object
      required:
        - item_id
        - sort_order
      properties:
        item_id:
          type: integer
          minimum: 1
        sort_order:
          type: integer
          minimum: 1

    OutfitUpsertRequest:
      type: object
      description: |
        Outfit の作成 / 更新 request。
        通常の作成 / 更新 payload に status は含めない。
        status は内部状態として管理し、invalid は item 状態変化の副作用でのみ発生する。

        items は 1 件以上必須。
        同一 outfit 内で同一 item_id の重複は不可。
        指定できるのは active な item のみで、disposed item は指定不可。
        sort_order は 1, 2, 3... の連番を前提とする。
      required:
        - items
      properties:
        name:
          type: string
          nullable: true
          maxLength: 255
        memo:
          type: string
          nullable: true
        seasons:
          type: array
          items:
            type: string
        tpos:
          type: array
          items:
            type: string
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OutfitItemInput'

    OutfitsResponse:
      type: object
      description: |
        コーディネート一覧 response。
        現在の実装では `outfits` 配列に加えて、
        `meta.total` / `meta.totalAll` / `meta.page` / `meta.lastPage` を返す。
      required:
        - outfits
        - meta
      properties:
        outfits:
          type: array
          items:
            $ref: '#/components/schemas/OutfitRecord'
        meta:
          type: object
          required:
            - total
            - totalAll
            - page
            - lastPage
          properties:
            total:
              type: integer
              example: 8
            totalAll:
              type: integer
              example: 8
            page:
              type: integer
              example: 1
            lastPage:
              type: integer
              example: 1

    OutfitResponse:
      type: object
      required:
        - outfit
      properties:
        outfit:
          $ref: '#/components/schemas/OutfitRecord'

    OutfitResponseWithMessage:
      allOf:
        - $ref: '#/components/schemas/MessageOnlyResponse'
        - type: object
          required:
            - outfit
          properties:
            outfit:
              $ref: '#/components/schemas/OutfitRecord'

    OutfitDuplicateItem:
      type: object
      required:
        - item_id
        - sort_order
        - selectable
      properties:
        item_id:
          type: integer
          example: 101
        sort_order:
          type: integer
          minimum: 1
          example: 1
        selectable:
          type: boolean
          example: true
        note:
          type: string
          nullable: true
          example: 手放したアイテムのため初期選択から除外

    OutfitDuplicatePayload:
      type: object
      required:
        - name
        - items
      properties:
        name:
          type: string
          nullable: true
          example: 通勤セット（コピー）
        memo:
          type: string
          nullable: true
          example: 春秋向け
        seasons:
          type: array
          items:
            type: string
        tpos:
          type: array
          items:
            type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/OutfitDuplicateItem'

    OutfitDuplicateResponse:
      type: object
      required:
        - message
        - outfit
      properties:
        message:
          type: string
          example: duplicated_payload_ready
        outfit:
          $ref: '#/components/schemas/OutfitDuplicatePayload'

    WearLogStatus:
      type: string
