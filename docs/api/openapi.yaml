openapi: 3.0.3

info:
  title: Wardrobe App API
  version: 0.1.0
  description: |
    Wardrobe App のAPI仕様。

    このAPIは Cookie ベースのセッション認証を使用する。
    CSRF 保護が必要な POST / PUT / DELETE では X-CSRF-TOKEN ヘッダが必要。
    docs 上では認証系 API / 設定系 API / 参照マスタ API を軸に整理しつつ、Items / Outfits も実装単位で記載する。

servers:
  - url: http://localhost:8000
    description: ローカル開発環境

tags:
  - name: Auth
    description: 認証・セッション関連 API
  - name: ReferenceMasters
    description: 参照マスタ API
  - name: Settings
    description: 設定関連 API
  - name: Items
    description: アイテム関連 API
  - name: Outfits
    description: コーディネート関連 API
  - name: Wear Logs
    description: wear logs 関連 API
  - name: Purchase Candidates
    description: purchase_candidates 関連 API

paths:
  /csrf-cookie:
    get:
      tags:
        - Auth
      summary: CSRFトークンとセッションCookieを発行する
      description: |
        CSRF保護が必要な API を呼ぶ前に実行する。
        XSRF-TOKEN とセッションCookie を Cookie に設定する。
      operationId: getCsrfCookie
      responses:
        '204':
          description: レスポンスボディなし
          headers:
            Set-Cookie:
              description: "XSRF-TOKEN とセッションCookie が設定される"
              schema:
                type: string

  /api/register:
    post:
      tags:
        - Auth
      summary: ユーザー登録
      description: |
        新規ユーザーを登録し、成功時はそのままログイン状態にする。
        Cookie ベース認証のため、事前に /csrf-cookie を呼び出し X-CSRF-TOKEN を付与する。
      operationId: register
      parameters:
        - $ref: '#/components/parameters/XCsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: ユーザー登録成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '422':
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/settings/brands:
    get:
      tags:
        - Settings
      summary: ブランド候補一覧取得
      description: ユーザー単位のブランド候補を返す。active_only と keyword で絞り込みでき、item 新規作成 / 編集のブランド候補サジェストにも利用する。
      security:
        - SessionCookieAuth: []
      parameters:
        - in: query
          name: active_only
          schema:
            type: boolean
          description: true のとき有効な候補だけ返す
        - in: query
          name: keyword
          schema:
            type: string
            maxLength: 255
          description: ブランド名または読み仮名で候補を絞り込む
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserBrandsResponse'
        '401':
          description: 未認証
    post:
      tags:
        - Settings
      summary: ブランド候補追加
      description: ブランド候補を user 単位で追加する。重複判定は backend 側で行う。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/XCsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserBrandUpsertRequest'
      responses:
        '201':
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserBrandResponseWithMessage'
        '401':
          description: 未認証
        '422':
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/settings/brands/{id}:
    patch:
      tags:
        - Settings
      summary: ブランド候補更新
      description: ブランド候補の名称・読み仮名・有効状態を更新する。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/XCsrfTokenHeader'
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserBrandUpdateRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserBrandResponseWithMessage'
        '401':
          description: 未認証
        '404':
          description: 対象なし
        '422':
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/login:
    post:
      tags:
        - Auth
      summary: ログイン
      description: |
        メールアドレスとパスワードでログインする。
        Cookie ベース認証のため、事前に /csrf-cookie を呼び出し X-CSRF-TOKEN を付与する。
      operationId: login
      parameters:
        - $ref: '#/components/parameters/XCsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: ログイン成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '422':
          description: 認証失敗またはバリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/me:
    get:
      tags:
        - Auth
      summary: ログインユーザー情報取得
      operationId: me
      security:
        - SessionCookieAuth: []
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: 未認証

  /api/logout:
    post:
      tags:
        - Auth
      summary: ログアウト
      description: |
        ルート定義は auth:web 配下に置くが、未認証で /api/logout を呼んだ場合も例外ハンドラ側で logged_out を返す。
        POST のため X-CSRF-TOKEN ヘッダが必要。
      operationId: logout
      parameters:
        - $ref: '#/components/parameters/XCsrfTokenHeader'
      responses:
        '200':
          description: ログアウト成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageOnlyResponse'

  /api/categories:
    get:
      tags:
        - ReferenceMasters
      summary: カテゴリ一覧取得
      description: 参照マスタとしてカテゴリ一覧を返す。実装は api/routes/api.php 側に定義されている。
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoriesResponse'

  /api/settings/categories:
    get:
      tags:
        - Settings
      summary: カテゴリ表示設定取得
      security:
        - SessionCookieAuth: []
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryVisibilitySettingsResponse'
        '401':
          description: 未認証
    put:
      tags:
        - Settings
      summary: カテゴリ表示設定更新
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/XCsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCategoryVisibilitySettingsRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryVisibilitySettingsUpdatedResponse'
        '401':
          description: 未認証
        '422':
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/items:
    get:
      tags:
        - Items
      summary: アイテム一覧取得
      description: |
        通常一覧に表示する status=active の item を返す。
        response 形式は items 配列と meta.total / meta.totalAll /
        meta.page / meta.lastPage を含む。
      security:
        - SessionCookieAuth: []
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemsResponse'
        '401':
          description: 未認証
    post:
      tags:
        - Items
      summary: アイテム作成
      description: |
        通常の item 作成に加えて、purchase_candidate_id を渡した場合は
        Laravel 側で item 作成、candidate 由来画像の item 用保存先への物理コピー、
        candidate の status=purchased 更新、converted_item_id / converted_at 更新を
        同じ transaction で処理する。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/XCsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemCreateRequest'
      responses:
        '201':
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponseWithMessage'
        '401':
          description: 未認証
        '422':
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/items/{id}:
    get:
      tags:
        - Items
      summary: アイテム詳細取得
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/ItemIdPath'
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponse'
        '401':
          description: 未認証
        '404':
          description: 未検出
    put:
      tags:
        - Items
      summary: アイテム更新
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/ItemIdPath'
        - $ref: '#/components/parameters/XCsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemUpsertRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponseWithMessage'
        '401':
          description: 未認証
        '404':
          description: 未検出
        '422':
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
    delete:
      tags:
        - Items
      summary: アイテム削除
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/ItemIdPath'
        - $ref: '#/components/parameters/XCsrfTokenHeader'
      responses:
        '200':
          description: 削除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageOnlyResponse'
        '401':
          description: 未認証
        '404':
          description: 未検出

  /api/items/{id}/images:
    post:
      tags:
        - Items
      summary: アイテム画像追加
      description: |
        item に画像を追加する。
        画像は item 用保存先へ保存し、item_images として candidate 側とは別管理にする。
        現時点では JPEG / PNG / WebP、5MB 以下、最大 5 枚を想定する。
        既存画像の並び替えと代表画像切り替えは PUT /api/items/{id} の images payload で更新する。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/ItemIdPath'
        - $ref: '#/components/parameters/XCsrfTokenHeader'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  format: binary
                sort_order:
                  type: integer
                  minimum: 1
                is_primary:
                  type: boolean
      responses:
        '201':
          description: 追加成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                  - image
                properties:
                  message:
                    type: string
                    example: created
                  image:
                    $ref: '#/components/schemas/ItemImageRecord'
        '401':
          description: 未認証
        '404':
          description: 未検出
        '422':
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/items/{id}/images/{imageId}:
    delete:
      tags:
        - Items
      summary: アイテム画像削除
      description: |
        item に紐づく画像を削除する。
        candidate 側画像とは別管理のため、自動同期は行わない。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/ItemIdPath'
        - name: imageId
          in: path
          required: true
          schema:
            type: integer
        - $ref: '#/components/parameters/XCsrfTokenHeader'
      responses:
        '200':
          description: 削除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageOnlyResponse'
        '401':
          description: 未認証
        '404':
          description: 未検出

  /api/items/{id}/dispose:
    post:
      tags:
        - Items
      summary: アイテムを disposed に変更
      description: |
        item を disposed に変更し、「手放した / 現在所持していない」状態へ遷移させる。
        通常の ItemUpsertRequest とは分けて扱う。
        関連する active outfit がある場合は、それらを invalid にする副作用を伴う。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/ItemIdPath'
        - $ref: '#/components/parameters/XCsrfTokenHeader'
      responses:
        '200':
          description: 変更成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponseWithMessage'
        '401':
          description: 未認証
        '404':
          description: 未検出
        '422':
          description: 変更不可またはバリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/items/{id}/reactivate:
    post:
      tags:
        - Items
      summary: アイテムを active に戻す
      description: |
        item を active に戻すが、関連 outfit は自動 restore しない。
        通常の ItemUpsertRequest とは分けて扱う。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/ItemIdPath'
        - $ref: '#/components/parameters/XCsrfTokenHeader'
      responses:
        '200':
          description: 変更成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemResponseWithMessage'
        '401':
          description: 未認証
        '404':
          description: 未検出
        '422':
          description: 変更不可またはバリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/outfits:
    get:
      tags:
        - Outfits
      summary: コーディネート一覧取得
      description: |
        通常一覧に表示する status=active の outfit を返す。
        response 形式は outfits 配列と meta.total / meta.totalAll /
        meta.page / meta.lastPage を含む。
      security:
        - SessionCookieAuth: []
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutfitsResponse'
        '401':
          description: 未認証
    post:
      tags:
        - Outfits
      summary: コーディネート作成
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/XCsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OutfitUpsertRequest'
      responses:
        '201':
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutfitResponseWithMessage'
        '401':
          description: 未認証
        '422':
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/outfits/{id}:
    get:
      tags:
        - Outfits
      summary: コーディネート詳細取得
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/OutfitIdPath'
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutfitResponse'
        '401':
          description: 未認証
        '404':
          description: 未検出
    put:
      tags:
        - Outfits
      summary: コーディネート更新
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/OutfitIdPath'
        - $ref: '#/components/parameters/XCsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OutfitUpsertRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutfitResponseWithMessage'
        '401':
          description: 未認証
        '404':
          description: 未検出
        '422':
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
    delete:
      tags:
        - Outfits
      summary: コーディネート削除
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/OutfitIdPath'
        - $ref: '#/components/parameters/XCsrfTokenHeader'
      responses:
        '200':
          description: 削除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageOnlyResponse'
        '401':
          description: 未認証
        '404':
          description: 未検出

  /api/outfits/invalid:
    get:
      tags:
        - Outfits
      summary: invalid コーディネート一覧取得
      description: |
        通常一覧には出さない status=invalid の outfit を返す。
        response 形式は通常一覧と同じ OutfitsResponse を使い、
        meta.page / meta.lastPage / meta.total / meta.totalAll を返す。
      security:
        - SessionCookieAuth: []
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutfitsResponse'
        '401':
          description: 未認証

  /api/outfits/{id}/restore:
    post:
      tags:
        - Outfits
      summary: invalid コーディネート手動復帰
      description: |
        対象 outfit が invalid で、構成 item がすべて active の場合のみ
        status=active へ復帰できる。
        item や outfit_items 自体は書き換えない。
        主な利用箇所は invalid outfit 一覧または詳細画面の補助導線を想定する。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/OutfitIdPath'
        - $ref: '#/components/parameters/XCsrfTokenHeader'
      responses:
        '200':
          description: 復帰成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutfitResponseWithMessage'
        '401':
          description: 未認証
        '404':
          description: 未検出
        '422':
          description: 復帰不可またはバリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/outfits/{id}/duplicate:
    post:
      tags:
        - Outfits
      summary: コーディネート複製
      description: |
        active / invalid を問わず複製可能とする。
        invalid outfit の場合は再利用導線として特に重要とし、
        disposed item は通常選択状態にしない形で初期値生成する。
        response の outfit は保存済み record ではなく、
        新規作成画面へ渡す初期値 payload を返す。
        items[*].selectable=false と note により、
        現在は使えない item を補助表示できる。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/OutfitIdPath'
        - $ref: '#/components/parameters/XCsrfTokenHeader'
      responses:
        '200':
          description: 複製用初期値取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutfitDuplicateResponse'
        '401':
          description: 未認証
        '404':
          description: 未検出

  /api/wear-logs:
    get:
      tags:
        - Wear Logs
      summary: wear logs 一覧取得
      description: |
        event_date desc, display_order asc を初期並び順とし、
        meta.total / totalAll / page / lastPage を返す。
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: keyword
          in: query
          required: false
          schema:
            type: string
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [date_desc, date_asc]
            default: date_desc
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [planned, worn]
        - name: date_from
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        '200':
          description: wear logs 一覧
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WearLogsResponse'
        '401':
          description: 未認証

    post:
      tags:
        - Wear Logs
      summary: wear log 作成
      description: |
        source_outfit_id のみ、items のみ、両方指定のいずれも許可する。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WearLogUpsertRequest'
      responses:
        '201':
          description: wear log 作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WearLogMutationResponse'
        '401':
          description: 未認証
        '422':
          description: バリデーションエラー
  /api/wear-logs/{wearLogId}:
    get:
      tags:
        - Wear Logs
      summary: wear log 詳細取得
      description: wear log の詳細を返す。
      parameters:
        - name: wearLogId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: wear log 詳細
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WearLogResponse'
        '401':
          description: 未認証
        '404':
          description: 対象データなし

    put:
      tags:
        - Wear Logs
      summary: wear log 更新
      description: |
        既存レコードに含まれる現在候補外の item / outfit は、
        同一 record の再保存に限り保持できる。
      parameters:
        - name: wearLogId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WearLogUpsertRequest'
      responses:
        '200':
          description: wear log 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WearLogMutationResponse'
        '401':
          description: 未認証
        '404':
          description: 対象データなし
        '422':
          description: バリデーションエラー

    delete:
      tags:
        - Wear Logs
      summary: wear log 削除
      description: |
        対象の wear log と関連する wear_log_items を物理削除する。
        item / outfit 側の record や他の wear log には影響を与えない。
      parameters:
        - name: wearLogId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: wear log 削除成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: deleted
                required:
                  - message
        '401':
          description: 未認証
        '404':
          description: 対象データなし

  /api/purchase-candidates:
    get:
      tags:
        - Purchase Candidates
      summary: 購入候補一覧取得
      description: |
        considering / on_hold / purchased / dropped の purchase candidate を返す。
        一覧は purchaseCandidates 配列と meta.total / totalAll / page / lastPage を返す。
        比較結果は詳細ロジックを固定せず、現時点では補助表示向けの情報に留める。
      security:
        - SessionCookieAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: keyword
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/PurchaseCandidateStatus'
        - name: priority
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/PurchaseCandidatePriority'
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: sort
          in: query
          required: false
          schema:
            type: string
          description: 並び順の詳細は後続検討。
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseCandidateListResponse'
        '401':
          description: 未認証
    post:
      tags:
        - Purchase Candidates
      summary: 購入候補作成
      description: |
        purchase candidate を新規作成する。
        比較結果の詳細計算は行わず、候補の保存を主責務とする。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/XCsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PurchaseCandidateUpsertRequest'
      responses:
        '201':
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseCandidateResponseWithMessage'
        '401':
          description: 未認証
        '422':
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/purchase-candidates/{id}:
    get:
      tags:
        - Purchase Candidates
      summary: 購入候補詳細取得
      description: |
        purchase candidate の基本情報、画像、item 化状況を返す。
        比較結果は補助表示前提とし、詳細ロジックは後続検討とする。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/PurchaseCandidateIdPath'
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseCandidateResponse'
        '401':
          description: 未認証
        '404':
          description: 未検出
    put:
      tags:
        - Purchase Candidates
      summary: 購入候補更新
      description: |
        purchase candidate の状態、優先度、比較用属性を更新する。
        dropped は見送り状態であり DELETE とは別に扱う。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/PurchaseCandidateIdPath'
        - $ref: '#/components/parameters/XCsrfTokenHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PurchaseCandidateUpsertRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseCandidateResponseWithMessage'
        '401':
          description: 未認証
        '404':
          description: 未検出
        '422':
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
    delete:
      tags:
        - Purchase Candidates
      summary: 購入候補削除
      description: |
        登録ミスや重複など、record 自体が不要になった purchase candidate を削除する。
        見送り履歴を残したい場合は dropped を使い、DELETE とは役割を分ける。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/PurchaseCandidateIdPath'
        - $ref: '#/components/parameters/XCsrfTokenHeader'
      responses:
        '200':
          description: 削除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageOnlyResponse'
        '401':
          description: 未認証
        '404':
          description: 未検出

  /api/purchase-candidates/{id}/images:
    post:
      tags:
        - Purchase Candidates
      summary: 購入候補画像追加
      description: |
        purchase candidate に画像を追加する。
        画像は複数枚対応で、上限は 5 枚を前提とする。
        sort_order と is_primary は item 側への引き継ぎにも使う。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/PurchaseCandidateIdPath'
        - $ref: '#/components/parameters/XCsrfTokenHeader'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PurchaseCandidateImageUploadRequest'
      responses:
        '201':
          description: 追加成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseCandidateImageResponseWithMessage'
        '401':
          description: 未認証
        '404':
          description: 未検出
        '422':
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

  /api/purchase-candidates/{id}/images/{imageId}:
    delete:
      tags:
        - Purchase Candidates
      summary: 購入候補画像削除
      description: |
        purchase candidate に紐づく画像を削除する。
        item 側画像とは別管理のため、candidate 側画像だけを対象にする。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/PurchaseCandidateIdPath'
        - $ref: '#/components/parameters/PurchaseCandidateImageIdPath'
        - $ref: '#/components/parameters/XCsrfTokenHeader'
      responses:
        '200':
          description: 削除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageOnlyResponse'
        '401':
          description: 未認証
        '404':
          description: 未検出

  /api/purchase-candidates/{id}/item-draft:
    post:
      tags:
        - Purchase Candidates
      summary: item 作成初期値生成
      description: |
        purchase candidate から item 作成画面用の初期値 payload を生成する。
        保存済み item を返す API ではない。
        candidate に登録済みの全画像を引き継ぎ、sort_order と is_primary も維持する。
        item 保存成功時に candidate を purchased に更新する責務分割は後続整理とする。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: '#/components/parameters/PurchaseCandidateIdPath'
        - $ref: '#/components/parameters/XCsrfTokenHeader'
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PurchaseCandidateItemDraftResponse'
        '401':
          description: 未認証
        '404':
          description: 未検出


components:
  parameters:
    XCsrfTokenHeader:
      name: X-CSRF-TOKEN
      in: header
      required: false
      description: |
        CSRF対策用ヘッダ。
        /csrf-cookie 実行後に取得した XSRF-TOKEN と同じ値を指定する。
        実運用では必須。
        Swagger UI では requestInterceptor により自動付与する。
      schema:
        type: string
    ItemIdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    OutfitIdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    PurchaseCandidateIdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    PurchaseCandidateImageIdPath:
      name: imageId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1

  schemas:
    User:
      type: object
      required:
        - id
        - name
        - email
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          maxLength: 50
          example: Test
        email:
          type: string
          format: email
          maxLength: 255
          example: sample.user@gmail.com

    RegisterRequest:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
          maxLength: 50
          example: Test
        email:
          type: string
          format: email
          maxLength: 255
          example: sample.user@gmail.com
        password:
          type: string
          minLength: 8
          maxLength: 72
          example: password123

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          maxLength: 255
          example: sample.user@gmail.com
        password:
          type: string
          minLength: 8
          maxLength: 72
          example: password123

    RegisterResponse:
      type: object
      required:
        - message
        - user
      properties:
        message:
          type: string
          example: registered
        user:
          $ref: '#/components/schemas/User'

    LoginResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: logged_in

    MessageOnlyResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: logged_out

    ValidationErrorResponse:
      type: object
      required:
        - message
        - errors
      properties:
        message:
          type: string
          example: The given data was invalid.
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    CategoriesResponse:
      type: object
      required:
        - groups
      properties:
        groups:
          type: array
          items:
            $ref: '#/components/schemas/CategoryGroup'

    CategoryGroup:
      type: object
      required:
        - id
        - name
        - categories
      properties:
        id:
          type: string
          example: tops
        name:
          type: string
          example: トップス
        categories:
          type: array
          items:
            $ref: '#/components/schemas/Category'

    Category:
      type: object
      required:
        - id
        - groupId
        - name
      properties:
        id:
          type: string
          example: tops_tshirt
        groupId:
          type: string
          example: tops
        name:
          type: string
          example: Tシャツ

    CategoryVisibilitySettingsResponse:
      type: object
      required:
        - visibleCategoryIds
      properties:
        visibleCategoryIds:
          type: array
          items:
            type: string
          example:
            - tops_tshirt
            - bottoms_denim_pants

    UpdateCategoryVisibilitySettingsRequest:
      type: object
      required:
        - visibleCategoryIds
      properties:
        visibleCategoryIds:
          type: array
          items:
            type: string
          example:
            - tops_tshirt
            - bottoms_denim_pants

    CategoryVisibilitySettingsUpdatedResponse:
      allOf:
        - $ref: '#/components/schemas/MessageOnlyResponse'
        - type: object
          required:
            - visibleCategoryIds
          properties:
            visibleCategoryIds:
              type: array
              items:
                type: string

    UserBrandRecord:
      type: object
      required:
        - id
        - name
        - is_active
        - updated_at
      properties:
        id:
          type: integer
        name:
          type: string
        kana:
          type: string
          nullable: true
        is_active:
          type: boolean
        updated_at:
          type: string
          format: date-time

    UserBrandsResponse:
      type: object
      required:
        - brands
      properties:
        brands:
          type: array
          items:
            $ref: '#/components/schemas/UserBrandRecord'

    UserBrandUpsertRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 255
        kana:
          type: string
          nullable: true
          maxLength: 255
        is_active:
          type: boolean

    UserBrandUpdateRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        kana:
          type: string
          nullable: true
          maxLength: 255
        is_active:
          type: boolean

    UserBrandResponseWithMessage:
      allOf:
        - $ref: '#/components/schemas/MessageOnlyResponse'
        - type: object
          required:
            - brand
          properties:
            brand:
              $ref: '#/components/schemas/UserBrandRecord'

    ItemColor:
      type: object
      required:
        - role
        - mode
        - value
        - hex
        - label
      properties:
        role:
          type: string
          enum: [main, sub]
        mode:
          type: string
          enum: [preset, custom]
        value:
          type: string
          example: navy
        hex:
          type: string
          example: '#1f3a5f'
        label:
          type: string
          example: ネイビー

    TopsSpec:
      type: object
      properties:
        shape:
          type: string
        sleeve:
          type: string
        length:
          type: string
        neck:
          type: string
        design:
          type: string
        fit:
          type: string

    ItemSpec:
      type: object
      properties:
        tops:
          $ref: '#/components/schemas/TopsSpec'
      additionalProperties: true

    ItemRecord:
      type: object
      required:
        - id
        - status
        - category
        - shape
        - colors
        - seasons
        - tpos
        - is_rain_ok
        - images
      properties:
        id:
          type: integer
          example: 1
        status:
          type: string
          enum:
            - active
            - disposed
          example: active
        name:
          type: string
          nullable: true
          example: ネイビーTシャツ
        brand_name:
          type: string
          nullable: true
        price:
          type: integer
          nullable: true
        purchase_url:
          type: string
          nullable: true
          format: uri
        purchased_at:
          type: string
          nullable: true
          format: date-time
        size_gender:
          type: string
          nullable: true
          enum:
            - women
            - men
            - unisex
            - unknown
        size_label:
          type: string
          nullable: true
        size_note:
          type: string
          nullable: true
        size_details:
          type: object
          nullable: true
          properties:
            note:
              type: string
              nullable: true
        is_rain_ok:
          type: boolean
        category:
          type: string
          example: tops_tshirt
        shape:
          type: string
          example: crew_neck_tshirt
        colors:
          type: array
          items:
            $ref: '#/components/schemas/ItemColor'
        seasons:
          type: array
          items:
            type: string
        tpos:
          type: array
          items:
            type: string
        spec:
          allOf:
            - $ref: '#/components/schemas/ItemSpec'
          nullable: true
        images:
          type: array
          items:
            $ref: '#/components/schemas/ItemImageRecord'

    ItemUpsertRequest:
      type: object
      description: |
        Item の通常作成 / 更新 request。
        通常の作成 / 更新 payload に status は含めない。
        status は内部状態として管理し、disposed への変更は別導線で扱う想定とする。

        disposed は「手放した / 現在所持していない」状態を表す。
        disposed 変更時は、関連 outfit の invalid 化など副作用を伴うため、
        通常の項目更新とは分けて扱う前提とする。
      required:
        - category
        - shape
        - colors
      properties:
        name:
          type: string
          nullable: true
          maxLength: 255
        brand_name:
          type: string
          nullable: true
          maxLength: 255
        save_brand_as_candidate:
          type: boolean
          description: item 保存時にブランド候補への追加を試行するかどうか
        price:
          type: integer
          nullable: true
          minimum: 0
        purchase_url:
          type: string
          nullable: true
          format: uri
        purchased_at:
          type: string
          nullable: true
          format: date
        size_gender:
          type: string
          nullable: true
          enum:
            - women
            - men
            - unisex
            - unknown
        size_label:
          type: string
          nullable: true
          maxLength: 50
        size_note:
          type: string
          nullable: true
        size_details:
          type: object
          nullable: true
          properties:
            note:
              type: string
              nullable: true
        is_rain_ok:
          type: boolean
        category:
          type: string
          maxLength: 100
        shape:
          type: string
          maxLength: 100
        colors:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ItemColor'
        seasons:
          type: array
          items:
            type: string
        tpos:
          type: array
          items:
            type: string
        spec:
          $ref: '#/components/schemas/ItemSpec'
        images:
          type: array
          maxItems: 5
          items:
            $ref: '#/components/schemas/ItemImageUpsertPayload'

    ItemCreateRequest:
      allOf:
        - $ref: '#/components/schemas/ItemUpsertRequest'
        - type: object
          properties:
            purchase_candidate_id:
              type: integer
              nullable: true
              description: |
                購入検討から item へ昇格するときの source candidate ID。
                指定した場合は、item 作成成功時に candidate の status、
                converted_item_id、converted_at も更新する。

    ItemImageRecord:
      type: object
      required:
        - disk
        - path
        - sort_order
        - is_primary
      properties:
        id:
          type: integer
          nullable: true
        item_id:
          type: integer
          nullable: true
        disk:
          type: string
          nullable: true
        path:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
          format: uri
        original_filename:
          type: string
          nullable: true
        mime_type:
          type: string
          nullable: true
        file_size:
          type: integer
          nullable: true
        sort_order:
          type: integer
          minimum: 1
        is_primary:
          type: boolean

    ItemImageUpsertPayload:
      type: object
      description: |
        item 編集時に送る画像 payload。
        sort_order を正本とし、is_primary=true は常に 1 件だけになるよう backend 側でも正規化する。
      required:
        - sort_order
      properties:
        disk:
          type: string
          nullable: true
        path:
          type: string
          nullable: true
        original_filename:
          type: string
          nullable: true
        mime_type:
          type: string
          nullable: true
        file_size:
          type: integer
          nullable: true
        sort_order:
          type: integer
          minimum: 1
        is_primary:
          type: boolean

    ItemsResponse:
      type: object
      description: |
        アイテム一覧 response。
        現在の実装では items 配列に加えて、
        meta.total / meta.totalAll / meta.page / meta.lastPage を返す。
      required:
        - items
        - meta
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ItemRecord'
        meta:
          type: object
          required:
            - total
            - totalAll
            - page
            - lastPage
          properties:
            total:
              type: integer
              example: 12
            totalAll:
              type: integer
              example: 12
            page:
              type: integer
              example: 1
            lastPage:
              type: integer
              example: 2

    ItemResponse:
      type: object
      required:
        - item
      properties:
        item:
          $ref: '#/components/schemas/ItemRecord'

    ItemResponseWithMessage:
      allOf:
        - $ref: '#/components/schemas/MessageOnlyResponse'
        - type: object
          required:
            - item
          properties:
            item:
              $ref: '#/components/schemas/ItemRecord'

    OutfitItemPivotRecord:
      type: object
      required:
        - id
        - outfit_id
        - item_id
        - sort_order
      properties:
        id:
          type: integer
          example: 10
        outfit_id:
          type: integer
          example: 2
        item_id:
          type: integer
          example: 1
        sort_order:
          type: integer
          minimum: 1
          example: 1
        item:
          $ref: '#/components/schemas/ItemRecord'

    OutfitRecord:
      type: object
      required:
        - id
