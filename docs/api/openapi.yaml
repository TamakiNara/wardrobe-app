      additionalProperties: true

    ItemSizeDetailValue:
      type: object
      description: |
        実寸 1 項目の保存形式。単一値は `value` を使い、範囲値は `min` / `max` を使う。
        `note` は `ヌード寸` / `約` / `後ろ約` などの補足注記で、表示時は値の前に付与する。
        単位は cm 固定で、保存値には単位を含めない。
      properties:
        value:
          type: number
          format: float
          nullable: true
          description: 単一値。`min` / `max` を使う範囲入力時は `null`。
        min:
          type: number
          format: float
          nullable: true
          description: 範囲入力の下限。単一値入力時は `null`。
        max:
          type: number
          format: float
          nullable: true
          description: 範囲入力の上限。単一値入力時は `null`。
        note:
          type: string
          nullable: true
          maxLength: 50
          description: 表示時に値の前へ付ける補足注記。

    ItemSizeStructuredDetails:
      type: object
      description: |
        category / shape に応じた固定実寸項目。
        各キーは `value / min / max / note` を持ち、未入力キーは保存しない。
      properties:
        shoulder_width:
          allOf:
            - $ref: "#/components/schemas/ItemSizeDetailValue"
