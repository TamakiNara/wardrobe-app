    OutfitUpsertRequest:
      type: object
      description: |
        Outfit の作成 / 更新 request。
        通常の作成 / 更新 payload に status は含めない。
        status は内部状態として管理し、invalid は item 状態変化の副作用でのみ発生する。

        items は 1 件以上必須。
        同一 outfit 内で同一 item_id の重複は不可。
        指定できるのは active な item のみで、disposed item は指定不可。
        sort_order は 1, 2, 3... の連番を前提とする。
      required:
        - items
      properties:
        name:
          type: string
          nullable: true
          maxLength: 255
        memo:
          type: string
          nullable: true
        seasons:
          type: array
          items:
            type: string
        tpos:
          type: array
          items:
            type: string
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OutfitItemInput'

