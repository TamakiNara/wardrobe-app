              properties:
                care_status:
                  type: string
                  nullable: true
                  enum:
                    - in_cleaning
      responses:
        "200":
          description: "更新成功。message は `updated`、item には更新後 record を含む"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemResponseWithMessage"
        "401":
          description: 未認証
        "404":
          description: 未検出（対象なし・他人データ秘匿を含む）
        "422":
          description: バリデーションエラー
