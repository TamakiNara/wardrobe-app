        sale_price:
          type: integer
          nullable: true
          minimum: 0
        sale_ends_at:
          type: string
          format: date-time
          nullable: true
        purchase_url:
          type: string
          nullable: true
          format: uri
        memo:
          type: string
          nullable: true
        wanted_reason:
          type: string
          nullable: true
        size_gender:
          allOf:
            - $ref: "#/components/schemas/PurchaseCandidateSizeGender"
          nullable: true
        size_label:
          type: string
          nullable: true
          maxLength: 50
        size_note:
          type: string
          nullable: true
          description: サイズ感・着用感の補足メモ。
        size_details:
          allOf:
            - $ref: "#/components/schemas/ItemSizeDetails"
          nullable: true
          description: 構造化実寸。`structured` と `custom_fields` を持ち、item 化時も同じ意味で引き継ぐ。
        alternate_size_label:
          type: string
          nullable: true
          maxLength: 50
          description: 第2候補のサイズ表記。未入力なら `null`。
        alternate_size_note:
          type: string
          nullable: true
          description: 第2候補のサイズ感・着用感の補足メモ。
        alternate_size_details:
          allOf:
            - $ref: "#/components/schemas/ItemSizeDetails"
          nullable: true
          description: 第2候補の構造化実寸。`structured` と `custom_fields` を持つ。
        is_rain_ok:
          type: boolean
        sheerness:
          type: string
          nullable: true
          enum:
            - none
            - slight
            - high
        colors:
          type: array
          items:
            $ref: "#/components/schemas/PurchaseCandidateColor"
        seasons:
          type: array
          items:
            type: string
        tpos:
          type: array
          items:
            type: string
        materials:
          type: array
          description: item 側と同じ shape を使う素材・混率明細。未入力時は空配列または未指定を許可する。
          items:
