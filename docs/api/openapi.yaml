      type: object
      description: |
        コーディネート一覧 response。
        現在の実装では outfits 配列に加えて、
        meta.total / meta.totalAll / meta.page / meta.lastPage を返す。
      required:
        - outfits
        - meta
      properties:
        outfits:
          type: array
          items:
            $ref: '#/components/schemas/OutfitRecord'
        meta:
          type: object
          required:
