  /api/wear-logs:
    get:
      tags:
        - Wear Logs
      summary: wear logs 一覧取得
      description: |
        event_date desc, display_order asc を初期並び順とし、
        meta.total / totalAll / page / lastPage を返す。
        一覧用の補助配色サムネイルは `thumbnail_items` で返し、
        描画正本は `source_outfit_id` ではなく `wear_log_items` とする。
        `items=[]` かつ `source_outfit_id` ありで保存した record でも、
        現時点の実装では source outfit の構成を `wear_log_items` として実体化する。
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: keyword
          in: query
          required: false
          schema:
            type: string
        - name: sort
          in: query
          required: false
          schema:
            type: string
            enum: [date_desc, date_asc]
            default: date_desc
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [planned, worn]
        - name: date_from
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: date_to
          in: query
          required: false
          schema:
            type: string
            format: date
      responses:
        "200":
          description: wear logs 一覧
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WearLogsResponse"
        "401":
          description: 未認証

    post:
      tags:
        - Wear Logs
      summary: wear log 作成
      description: |
        source_outfit_id のみ、items のみ、両方指定のいずれも許可する。
        items は空配列を含めて常に指定する。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WearLogUpsertRequest"
      responses:
        "201":
          description: wear log 作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WearLogMutationResponse"
        "401":
          description: 未認証
        "422":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
  /api/wear-logs/calendar:
    get:
      tags:
        - Wear Logs
      summary: wear log 月カレンダー集約取得
      description: |
        月カレンダー表示専用の軽量 API。
        日付ごとの planned / worn 件数と、dot 表示用の最小情報を返す。
        dot は `planned / worn` のみを表し、警告状態やクリーニング中のような補助状態は含めない。
      parameters:
        - name: month
          in: query
          required: true
          schema:
            type: string
            format: year-month
            example: 2026-03
      responses:
        "200":
          description: wear log 月カレンダー集約
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WearLogCalendarResponse"
        "401":
          description: 未認証
        "422":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
  /api/wear-logs/by-date:
    get:
      tags:
