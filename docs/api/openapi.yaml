      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ItemIdPath"
        - name: imageId
          in: path
          required: true
          schema:
            type: integer
        - $ref: "#/components/parameters/XCsrfTokenHeader"
      responses:
        "200":
          description: "削除成功。message は `deleted`。画像一覧の正本は後続の item 詳細取得結果で確認する"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageOnlyResponse"
        "401":
          description: 未認証
        "404":
          description: 未検出（対象なし・他人データ秘匿を含む）

  /api/items/{id}/dispose:
