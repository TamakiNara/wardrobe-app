        body_width:
          allOf:
            - $ref: "#/components/schemas/ItemSizeDetailValue"
          description: 身幅
        body_length:
          allOf:
            - $ref: "#/components/schemas/ItemSizeDetailValue"
          description: 着丈
        sleeve_length:
          allOf:
            - $ref: "#/components/schemas/ItemSizeDetailValue"
          description: 袖丈
        sleeve_width:
          allOf:
            - $ref: "#/components/schemas/ItemSizeDetailValue"
          description: 袖幅
        cuff_width:
          allOf:
            - $ref: "#/components/schemas/ItemSizeDetailValue"
          description: 袖口幅
        neck_circumference:
          allOf:
            - $ref: "#/components/schemas/ItemSizeDetailValue"
          description: 襟周り
        waist:
          allOf:
            - $ref: "#/components/schemas/ItemSizeDetailValue"
          description: ウエスト
        hip:
          allOf:
            - $ref: "#/components/schemas/ItemSizeDetailValue"
          description: ヒップ
        rise:
          allOf:
            - $ref: "#/components/schemas/ItemSizeDetailValue"
          description: 股上
        inseam:
          allOf:
            - $ref: "#/components/schemas/ItemSizeDetailValue"
          description: 股下
        hem_width:
          allOf:
            - $ref: "#/components/schemas/ItemSizeDetailValue"
          description: 裾幅
        thigh_width:
          allOf:
            - $ref: "#/components/schemas/ItemSizeDetailValue"
          description: わたり幅
        total_length:
          allOf:
            - $ref: "#/components/schemas/ItemSizeDetailValue"
          description: 総丈。
        skirt_length:
          allOf:
            - $ref: "#/components/schemas/ItemSizeDetailValue"
          description: スカート丈。
        underbust:
          allOf:
            - $ref: "#/components/schemas/ItemSizeDetailValue"
          description: アンダーバスト。
        top_bust:
          allOf:
            - $ref: "#/components/schemas/ItemSizeDetailValue"
          description: トップバスト。
        height:
          allOf:
            - $ref: "#/components/schemas/ItemSizeDetailValue"
          description: 高さ（H）。
        width:
          allOf:
            - $ref: "#/components/schemas/ItemSizeDetailValue"
          description: 幅（W）。
        depth:
          allOf:
            - $ref: "#/components/schemas/ItemSizeDetailValue"
          description: マチ（D）。

    ItemSizeCustomField:
      type: object
      required:
