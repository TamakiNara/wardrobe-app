  /api/purchase-candidates:
    get:
      tags:
        - Purchase Candidates
      summary: 購入候補一覧取得
      description: |
        considering / on_hold / purchased / dropped の purchase candidate を返す。
        top-level category `underwear` は通常一覧では返さず、
        アンダーウェア専用一覧では `storage=underwear` を使う。
        一覧の正本 payload は purchaseCandidateEntries と meta.total / totalAll / page / lastPage。
        purchaseCandidateEntries は single / group の group-aware response とし、pagination は candidate 行数ではなく表示カード数を基準にする。
        比較結果は詳細ロジックを固定せず、現時点では補助表示向けの情報に留める。
      security:
        - SessionCookieAuth: []
      parameters:
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: keyword
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PurchaseCandidateStatus"
        - name: priority
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/PurchaseCandidatePriority"
        - name: category
          in: query
          required: false
          schema:
            type: string
          description: 親カテゴリ。subcategory は category 選択後のみ有効。
        - name: subcategory
          in: query
          required: false
          schema:
            type: string
          description: category 配下の current subcategory。category 未指定時の単独指定は初期実装では扱わない。
        - name: brand
          in: query
          required: false
          schema:
            type: string
        - name: sort
          in: query
          required: false
          schema:
            type: string
          description: 並び順の詳細は後続検討。
        - name: storage
          in: query
          required: false
          schema:
            type: string
            enum: [underwear]
          description: "'underwear' 指定時はアンダーウェア購入検討一覧として取得する。"
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseCandidateListResponse"
        "401":
          description: 未認証
    post:
      tags:
        - Purchase Candidates
      summary: 購入候補作成
      description: |
        purchase candidate を新規作成する。
        比較結果の詳細計算は行わず、候補の保存を主責務とする。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/XCsrfTokenHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseCandidateUpsertRequest"
      responses:
        "201":
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseCandidateResponseWithMessage"
        "401":
          description: 未認証
        "422":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

