    get:
      tags:
        - Purchase Candidates
      summary: 購入候補詳細取得
      description: |
        purchase candidate の基本情報、画像、item 化状況を返す。
        比較結果は補助表示前提とし、詳細ロジックは後続検討とする。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/PurchaseCandidateIdPath"
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseCandidateResponse"
        "401":
          description: 未認証
        "404":
          description: 未検出（対象なし・他人データ秘匿を含む）
    put:
      tags:
        - Purchase Candidates
      summary: 購入候補更新
      description: |
        purchase candidate の状態、優先度、比較用属性を更新する。
        dropped は見送り状態であり DELETE とは別に扱う。
        `purchased` の candidate は item 化済み履歴として扱い、
        `memo` / `wanted_reason` / `priority` / `sale_price` / `sale_ends_at` / `purchase_url` だけ更新できる。
        それ以外の項目を含む payload は 422 を返し、candidate 側の更新は item 正本へ逆流しない。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/PurchaseCandidateIdPath"
        - $ref: "#/components/parameters/XCsrfTokenHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PurchaseCandidateUpsertRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseCandidateResponseWithMessage"
        "401":
          description: 未認証
        "404":
          description: 未検出（対象なし・他人データ秘匿を含む）
        "422":
          description: "バリデーションエラー。`purchased` の candidate に更新不可項目を含めた場合もこの response を返す"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
    delete:
      tags:
        - Purchase Candidates
      summary: 購入候補削除
      description: |
        登録ミスや重複など、record 自体が不要になった purchase candidate を削除する。
        見送り履歴を残したい場合は dropped を使い、DELETE とは役割を分ける。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/PurchaseCandidateIdPath"
        - $ref: "#/components/parameters/XCsrfTokenHeader"
      responses:
        "200":
          description: "削除成功。message は `deleted`"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageOnlyResponse"
        "401":
          description: 未認証
        "404":
          description: 未検出（対象なし・他人データ秘匿を含む）

  /api/purchase-candidates/{id}/images:
    post:
      tags:
        - Purchase Candidates
      summary: 購入候補画像追加
      description: |
        purchase candidate に画像を追加する。
        画像は複数枚対応で、上限は 5 枚を前提とする。
        sort_order と is_primary は item 側への引き継ぎにも使う。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/PurchaseCandidateIdPath"
        - $ref: "#/components/parameters/XCsrfTokenHeader"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/PurchaseCandidateImageUploadRequest"
      responses:
        "201":
          description: 追加成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseCandidateImageResponseWithMessage"
        "401":
          description: 未認証
        "404":
          description: 未検出（対象なし・他人データ秘匿を含む）
        "422":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

  /api/purchase-candidates/{id}/images/{imageId}:
    delete:
      tags:
        - Purchase Candidates
      summary: 購入候補画像削除
      description: |
        purchase candidate に紐づく画像を削除する。
        item 側画像とは別管理のため、candidate 側画像だけを対象にする。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/PurchaseCandidateIdPath"
        - $ref: "#/components/parameters/PurchaseCandidateImageIdPath"
        - $ref: "#/components/parameters/XCsrfTokenHeader"
      responses:
        "200":
          description: "削除成功。message は `deleted`。画像一覧の正本は後続の購入候補詳細取得結果で確認する"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageOnlyResponse"
        "401":
          description: 未認証
        "404":
          description: 未検出（対象なし・他人データ秘匿を含む）

  /api/purchase-candidates/{id}/duplicate:
    post:
      tags:
        - Purchase Candidates
      summary: 購入候補複製
      description: |
        指定 purchase candidate を元に、新規作成画面へ渡す duplicate draft を返す。
        この API 呼び出し時点では新しい purchase candidate record は作成しない。
        status は `considering` へ戻し、colors / seasons / tpos / images / materials も draft として引き継ぐ。
        通常複製では `group_id` を引き継がない。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/PurchaseCandidateIdPath"
        - $ref: "#/components/parameters/XCsrfTokenHeader"
      responses:
        "200":
          description: "draft 作成成功。message は `duplicated_payload_ready`。purchaseCandidate には新規作成画面用 draft を返す"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseCandidateDuplicateResponse"
        "401":
          description: 未認証
        "404":
          description: 未検出（対象なし・他人データ秘匿を含む）

  /api/purchase-candidates/{id}/color-variant:
    post:
      tags:
        - Purchase Candidates
      summary: 色違い追加 draft 作成
      description: |
        指定 purchase candidate を元に、色違い追加用の draft を返す。
        draft 作成時点では元 candidate を更新せず、group も作成しない。
        response の draft payload には `variant_source_candidate_id` を含める。
        新 candidate 保存時に backend が source candidate の group を解決し、未所属なら保存 transaction 内で group を作成する。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/PurchaseCandidateIdPath"
        - $ref: "#/components/parameters/XCsrfTokenHeader"
      responses:
        "200":
          description: "draft 作成成功。message は `color_variant_payload_ready`。purchaseCandidate には色違い追加用 draft を返す"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseCandidateDuplicateResponse"
        "401":
          description: 未認証
        "404":
          description: 未検出（対象なし・他人データ秘匿を含む）

  /api/purchase-candidates/{id}/item-draft:
    post:
      tags:
        - Purchase Candidates
      summary: item 作成初期値生成
      description: |
        purchase candidate から item 作成画面用の初期値 payload を生成する。
        保存済み item を返す API ではない。
        candidate に登録済みの全画像を引き継ぎ、sort_order と is_primary も維持する。
        `materials` も同じ shape のまま item 作成初期値へ含める。
        `memo` は item 作成画面の初期値として含めるが、`wanted_reason` は item へ持ち込まない。
        item 保存成功時の candidate `purchased` 更新と converted 情報の保存は、item create 側で処理する。
        `purchased` の candidate では item 化済み履歴として扱うため、この API は利用しない。
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                selected_size:
                  type: string
                  nullable: true
                  enum:
                    - primary
                    - secondary
                  description: |
                    サイズ候補が2つある場合に、item 化へ使う候補を指定する。
                    1候補だけなら省略できる。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/PurchaseCandidateIdPath"
        - $ref: "#/components/parameters/XCsrfTokenHeader"
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PurchaseCandidateItemDraftResponse"
        "401":
          description: 未認証
        "404":
          description: 未検出（対象なし・他人データ秘匿を含む）
        "422":
          description: "item-draft を生成できないカテゴリ、`purchased` candidate に対する生成要求、または複数サイズ候補時の `selected_size` 未指定"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

  /api/settings/weather-locations:
    get:
      tags:
        - Settings
      summary: 天気登録で使う地域一覧を取得
      operationId: getWeatherLocations
      responses:
        "200":
          description: 地域一覧
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeatherLocationsResponse"
    post:
      tags:
        - Settings
      summary: 天気登録で使う地域を追加
      operationId: createWeatherLocation
      parameters:
        - $ref: "#/components/parameters/XCsrfTokenHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeatherLocationUpsertRequest"
      responses:
        "201":
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeatherLocationMutationResponse"
        "422":
          description: バリデーションエラー

  /api/settings/weather-locations/geocode:
    get:
      tags:
        - Settings
      summary: 地域名から Open-Meteo Geocoding 候補を検索
      description: |
        Open-Meteo Geocoding API を backend 経由で呼び出し、地域設定画面で使う候補一覧を返す。
        候補選択時は `latitude` / `longitude` / `timezone` をフォームへ自動反映し、地域名は空欄のときだけ補完する。
        Geocoding の詳細結果は今回は DB 保存しない。
      operationId: geocodeWeatherLocation
      security:
        - SessionCookieAuth: []
      parameters:
        - in: query
          name: query
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 100
          description: 検索に使う地域名キーワード
      responses:
        "200":
          description: 候補一覧
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeatherLocationGeocodeResponse"
        "422":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "502":
          description: Geocoding API 呼び出し失敗
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageOnlyResponse"

  /api/settings/weather-locations/{id}:
    patch:
      tags:
        - Settings
      summary: 天気登録で使う地域を更新
      operationId: updateWeatherLocation
      parameters:
        - $ref: "#/components/parameters/XCsrfTokenHeader"
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeatherLocationUpsertRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeatherLocationMutationResponse"
        "422":
          description: バリデーションエラー
    delete:
      tags:
        - Settings
      summary: 天気登録で使う地域を削除
      operationId: deleteWeatherLocation
      parameters:
        - $ref: "#/components/parameters/XCsrfTokenHeader"
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 削除成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageOnlyResponse"
        "422":
          description: 使用中地域のため削除不可

  /api/weather-records:
    get:
      tags:
        - Wear Logs
      summary: 指定日の天気記録一覧を取得
      operationId: getWeatherRecordsByDate
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: 天気記録一覧
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeatherRecordsResponse"
        "422":
          description: バリデーションエラー
    post:
      tags:
        - Wear Logs
      summary: 天気記録を作成
      operationId: createWeatherRecord
      parameters:
        - $ref: "#/components/parameters/XCsrfTokenHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeatherRecordUpsertRequest"
      responses:
        "201":
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeatherRecordMutationResponse"
        "422":
          description: バリデーションエラー

  /api/weather-records/forecast:
    post:
      tags:
        - Wear Logs
      summary: 保存済み地域の予報を取得してフォーム反映用データを返す
      description: |
        保存済み地域の provider 設定を backend 側で自動判定し、
        JMA コードがあれば JMA forecast JSON、なければ legacy `forecast_area_code` による
        weather.tsukumijima.net fallback を使って forecast を取得する。
        対象日付と一致する forecast を `weather_code` と気温へ正規化して返す。
        取得結果はフォーム反映のみで、自動保存は行わない。
        今回だけの地域は対象外で、JMA / legacy のどちらの予報コードもない地域は取得不可。
      operationId: fetchWeatherRecordForecast
      parameters:
        - $ref: "#/components/parameters/XCsrfTokenHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeatherForecastRequest"
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeatherForecastResponse"
        "422":
          description: バリデーションエラーまたは対象日不一致
        "502":
          description: 外部 API 通信失敗

  /api/weather-records/{id}:
    patch:
      tags:
        - Wear Logs
      summary: 天気記録を更新
      operationId: updateWeatherRecord
      parameters:
        - $ref: "#/components/parameters/XCsrfTokenHeader"
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeatherRecordUpsertRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeatherRecordMutationResponse"
        "422":
          description: バリデーションエラー
    delete:
      tags:
        - Wear Logs
      summary: 天気記録を削除
      operationId: deleteWeatherRecord
      parameters:
        - $ref: "#/components/parameters/XCsrfTokenHeader"
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: 削除成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageOnlyResponse"

components:
  parameters:
    XCsrfTokenHeader:
      name: X-CSRF-TOKEN
      in: header
      required: false
      description: |
        CSRF対策用ヘッダ。
        /csrf-cookie 実行後に取得した XSRF-TOKEN と同じ値を指定する。
        実運用では必須。
        Swagger UI では requestInterceptor により自動付与する。
      schema:
        type: string
    ItemIdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    OutfitIdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    PurchaseCandidateIdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    PurchaseCandidateImageIdPath:
      name: imageId
      in: path
      required: true
      schema:
        type: integer
        minimum: 1

  schemas:
    User:
      type: object
      required:
        - id
        - name
        - email
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          maxLength: 50
          example: Test
        email:
          type: string
          format: email
          maxLength: 255
          example: sample.user@gmail.com

    RegisterRequest:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
          maxLength: 50
          example: Test
        email:
          type: string
          format: email
          maxLength: 255
          example: sample.user@gmail.com
        password:
          type: string
          minLength: 8
          maxLength: 72
          example: password123

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          maxLength: 255
          example: sample.user@gmail.com
        password:
          type: string
          minLength: 8
          maxLength: 72
          example: password123

    RegisterResponse:
      type: object
      required:
        - message
        - user
      properties:
        message:
          type: string
          example: registered
        user:
          $ref: "#/components/schemas/User"

    LoginResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: logged_in

    MessageOnlyResponse:
      description: |
        action 完了を表す最小 response。
        `message` には `deleted` / `logged_out` などの action keyword を入れる。
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: logged_out

    ValidationErrorResponse:
      description: |
        field 単位の validation error を返す response。
        `message` は validation 全体の補助説明であり、正本は `errors` を読む。
      type: object
      required:
        - message
        - errors
      properties:
        message:
          type: string
          example: The given data was invalid.
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string

    UnprocessableEntityMessageResponse:
      description: |
        field 単位の `errors` を持たない 422 response。
        業務ルール違反や認証失敗など、message のみで補助説明を返す。
        現状の API では競合系も原則 409 ではなく 422 に寄せ、この schema を使う。
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: このコーディネートは復帰できません。

    CategoriesResponse:
      type: object
      required:
        - groups
      properties:
        groups:
          type: array
          items:
            $ref: "#/components/schemas/CategoryGroup"

    HomeSummaryResponse:
      type: object
      required:
        - summary
      properties:
        summary:
          $ref: "#/components/schemas/HomeSummary"

    HomeSummary:
      type: object
      required:
        - itemsCount
        - outfitsCount
        - wearLogsCount
        - purchaseCandidatesCount
      properties:
        itemsCount:
          type: integer
          example: 36
        outfitsCount:
          type: integer
          example: 12
        wearLogsCount:
          type: integer
          example: 14
        purchaseCandidatesCount:
          type: integer
          example: 8

    ImportExportOwner:
      type: object
      properties:
        user_id:
          type: integer
          example: 1
          nullable: true

    ImportExportUserTpo:
      type: object
      required:
        - name
      properties:
        id:
          type: integer
          nullable: true
        name:
          type: string
          maxLength: 50
        sort_order:
          type: integer
          nullable: true
          minimum: 1
        is_active:
          type: boolean
          nullable: true
        is_preset:
          type: boolean
          nullable: true

    ImportExportUserBrand:
      type: object
      required:
        - name
      properties:
        id:
          type: integer
          nullable: true
        name:
          type: string
          maxLength: 255
        kana:
          type: string
          nullable: true
          maxLength: 255
        is_active:
          type: boolean
          nullable: true

    ImportExportOpaqueEntity:
      type: object
      additionalProperties: true
      description: |
        import / export 用の entity payload。
        現状の実装では item / purchase candidate / outfit の保存項目をそのまま含み、
        画像は Base64 を含む。

    WearLogBackupItem:
      type: object
      required:
        - item_source_type
        - sort_order
      properties:
        source_item_id:
          type: integer
          nullable: true
          example: 10
        item_source_type:
          type: string
          enum: [outfit, manual]
          example: outfit
        sort_order:
          type: integer
          minimum: 1
          example: 1

    WearLogBackupPayload:
      type: object
      required:
        - id
        - status
        - event_date
        - display_order
        - items
      properties:
        id:
          type: integer
          example: 1
        status:
          type: string
          enum: [planned, worn]
          example: worn
        event_date:
          type: string
          format: date
          example: 2026-04-25
        display_order:
          type: integer
          minimum: 1
          example: 1
        source_outfit_id:
          type: integer
          nullable: true
          example: 5
        memo:
          type: string
          nullable: true
          example: 通勤コーデの記録
        outdoor_temperature_feel:
          allOf:
            - $ref: "#/components/schemas/WearLogTemperatureFeel"
          nullable: true
        indoor_temperature_feel:
          allOf:
            - $ref: "#/components/schemas/WearLogTemperatureFeel"
          nullable: true
        overall_rating:
          allOf:
            - $ref: "#/components/schemas/WearLogOverallRating"
          nullable: true
        feedback_tags:
          type: array
          nullable: true
          items:
            $ref: "#/components/schemas/WearLogFeedbackTag"
          description: |
            服装の振り返りタグ。重複は保存時に一意化し、空配列は `null` として扱う。
        feedback_memo:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: "#/components/schemas/WearLogBackupItem"

    ImportExportBackupPayload:
      type: object
      required:
        - version
        - exported_at
        - items
        - purchase_candidates
        - outfits
        - wear_logs
      properties:
        version:
          type: integer
          enum: [1]
          example: 1
        exported_at:
          type: string
          format: date-time
          example: "2026-04-25T06:51:38+09:00"
        owner:
          $ref: "#/components/schemas/ImportExportOwner"
        user_tpos:
          type: array
          items:
            $ref: "#/components/schemas/ImportExportUserTpo"
        user_brands:
          type: array
          items:
