            - active
            - disposed
          example: active
        care_status:
          type: string
          nullable: true
          enum:
            - in_cleaning
        sheerness:
          type: string
          nullable: true
          enum:
            - none
            - slight
            - high
        name:
          type: string
          nullable: true
          example: ネイビーTシャツ
        brand_name:
          type: string
          nullable: true
        price:
          type: integer
          nullable: true
        purchase_url:
          type: string
          nullable: true
          format: uri
        memo:
          type: string
          nullable: true
        purchased_at:
          type: string
          nullable: true
          format: date-time
        size_gender:
          type: string
          nullable: true
          enum:
            - women
            - men
            - unisex
        size_label:
          type: string
          nullable: true
        size_note:
          type: string
          nullable: true
          description: サイズ感・着用感の補足メモ。
        size_details:
          allOf:
            - $ref: "#/components/schemas/ItemSizeDetails"
          nullable: true
        is_rain_ok:
          type: boolean
        category:
          type: string
          example: tops_tshirt
        shape:
          type: string
          example: crew_neck_tshirt
        colors:
          type: array
          items:
            $ref: "#/components/schemas/ItemColor"
        seasons:
          type: array
          items:
            type: string
        tpos:
          type: array
          description: "`tpo_ids` を現在のユーザーの TPO 名へ解決した表示用配列。"
          items:
            type: string
        tpo_ids:
          type: array
          description: item 側の保存正本となる TPO ID 配列。
          items:
            type: integer
        spec:
          allOf:
            - $ref: "#/components/schemas/ItemSpec"
          nullable: true
        materials:
          type: array
          items:
            $ref: "#/components/schemas/ItemMaterialRecord"
        images:
          type: array
          items:
            $ref: "#/components/schemas/ItemImageRecord"

    ItemUpsertRequest:
      type: object
      description: |
        Item の通常作成 / 更新 request。
        通常の作成 / 更新 payload に status は含めない。
        status は内部状態として管理し、disposed への変更は別導線で扱う。

        disposed は「手放した / 現在所持していない」状態を表す。
        disposed 変更時は、関連 outfit の invalid 化など副作用を伴うため、
        通常の項目更新とは分けて扱う前提とする。
        `spec` の条件付き必須は category / shape に応じて判定し、bottoms では `spec.bottoms.length_type`、legwear の `socks` / `leggings` では `spec.legwear.coverage_type` を必須とする。
        `tights` / `stockings` は今回の必須化対象外で、固定値補完を許容する。
      required:
        - category
        - shape
        - colors
      properties:
        name:
          type: string
          nullable: true
          maxLength: 255
        brand_name:
          type: string
          nullable: true
          maxLength: 255
        save_brand_as_candidate:
          type: boolean
          description: item 保存時にブランド候補への追加を試行するかどうか
        price:
          type: integer
          nullable: true
          minimum: 0
        purchase_url:
          type: string
          nullable: true
          format: uri
        memo:
          type: string
          nullable: true
        purchased_at:
          type: string
          nullable: true
          format: date
        size_gender:
          type: string
          nullable: true
          enum:
            - women
            - men
            - unisex
        size_label:
          type: string
          nullable: true
          maxLength: 50
        size_note:
          type: string
          nullable: true
          description: サイズ感・着用感の補足メモ。
        size_details:
          allOf:
            - $ref: "#/components/schemas/ItemSizeDetails"
          nullable: true
          description: |
            構造化された実寸情報。`structured` は category / shape ごとの固定実寸、
            `custom_fields` は自由項目。各項目は `value / min / max / note` を持ち、
            単一値・範囲値・注記を同じ構造で扱う。
        sheerness:
          type: string
          nullable: true
          enum:
            - none
            - slight
            - high
        is_rain_ok:
          type: boolean
        category:
          type: string
          maxLength: 100
        shape:
          type: string
          maxLength: 100
        colors:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ItemColor"
        seasons:
          type: array
          items:
            type: string
        tpos:
          type: array
          deprecated: true
          description: |
            旧 name ベース request との互換用フィールド。
            現時点の実装では `tpo_ids` を正本として扱う。
          items:
            type: string
        tpo_ids:
          type: array
          items:
            type: integer
        spec:
          $ref: "#/components/schemas/ItemSpec"
        materials:
          type: array
          nullable: true
          description: |
            item の素材・混率明細。未入力なら未指定または空配列を許可する。
            区分ごとの合計100%、同一区分内の同素材重複不可を 現在のルールとする。
          items:
            $ref: "#/components/schemas/ItemMaterialRecord"
        images:
          type: array
          maxItems: 5
          items:
            $ref: "#/components/schemas/ItemImageUpsertPayload"

    ItemCreateRequest:
      allOf:
        - $ref: "#/components/schemas/ItemUpsertRequest"
        - type: object
          properties:
            purchase_candidate_id:
              type: integer
              nullable: true
              description: |
                購入検討から item へ昇格するときの source candidate ID。
                指定した場合は、item 作成成功時に candidate の status、
                converted_item_id、converted_at も更新する。

    ItemImageRecord:
      type: object
      required:
        - disk
        - path
        - sort_order
        - is_primary
      properties:
        id:
          type: integer
          nullable: true
        item_id:
          type: integer
          nullable: true
        disk:
          type: string
          nullable: true
        path:
          type: string
          nullable: true
        url:
          type: string
          nullable: true
          format: uri
        original_filename:
          type: string
          nullable: true
        mime_type:
          type: string
          nullable: true
        file_size:
          type: integer
          nullable: true
        sort_order:
          type: integer
          minimum: 1
        is_primary:
          type: boolean

    ItemMaterialRecord:
      type: object
      required:
        - part_label
        - material_name
        - ratio
      properties:
        part_label:
          type: string
          description: 区分名。`本体` / `裏地` / `別布` / `リブ` を初期候補としつつ自由入力を許可する。
        material_name:
          type: string
          description: 素材名。候補補助はあるが保存正本は文字列とする。
        ratio:
          type: integer
          minimum: 1
          maximum: 100
          description: 区分内での混率。現時点では整数のみを許可する。

    ItemImageUpsertPayload:
      type: object
      description: |
        item 編集時に送る画像 payload。
        sort_order を正本とし、is_primary=true は常に 1 件だけになるよう backend 側でも正規化する。
      required:
        - sort_order
      properties:
        disk:
          type: string
          nullable: true
        path:
          type: string
          nullable: true
        original_filename:
          type: string
          nullable: true
        mime_type:
          type: string
          nullable: true
        file_size:
          type: integer
          nullable: true
        sort_order:
          type: integer
