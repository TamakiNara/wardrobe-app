      properties:
        label:
          type: string
          description: 自由入力の実寸項目名
        value:
          type: number
          format: float
          nullable: true
          description: 単一値。範囲入力時は `null`。
        min:
          type: number
          format: float
          nullable: true
          description: 範囲入力の下限。
        max:
          type: number
          format: float
          nullable: true
          description: 範囲入力の上限。
        note:
          type: string
          nullable: true
          maxLength: 50
          description: 表示時に値の前へ付ける補足注記。
        sort_order:
          type: integer
          minimum: 1
          description: 表示順の正本

    ItemSizeDetails:
      type: object
      description: |
        構造化された実寸情報。`size_note` はサイズ感・着用感の補足メモとして別に持ち、
        `size_details` には実寸だけを保存する。旧 `size_details.note` は 現時点では廃止。
        固定実寸・自由実寸ともに `value / min / max / note` を使う。
      properties:
        structured:
          $ref: "#/components/schemas/ItemSizeStructuredDetails"
        custom_fields:
          type: array
          maxItems: 10
          items:
            $ref: "#/components/schemas/ItemSizeCustomField"

    ItemRecord:
      type: object
      required:
