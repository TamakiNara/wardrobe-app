        source_item_status:
          type: string
          nullable: true
          enum:
            - active
            - disposed
        sort_order:
          type: integer
          example: 1
        item_source_type:
          $ref: '#/components/schemas/WearLogItemSourceType'

    WearLogDetail:
      type: object
      required:
        - id
        - status
        - event_date
        - display_order
        - items
      properties:
        id:
          type: integer
          example: 1
        status:
          $ref: '#/components/schemas/WearLogStatus'
        event_date:
          type: string
          format: date
          example: '2026-03-21'
        display_order:
          type: integer
          example: 1
        source_outfit_id:
          type: integer
