openapi: 3.0.3

info:
  title: Wardrobe App API
  version: 0.1.0
  description: |
    Wardrobe App のAPI仕様。

    このAPIは Cookie ベースのセッション認証を使用する。
    CSRF 保護が必要な POST / PUT / DELETE では X-CSRF-TOKEN ヘッダが必要。
    docs 上では認証系 API / 設定系 API / 参照マスタ API を軸に整理しつつ、Items / Outfits も実装単位で記載する。
    `400` / `429` / `500` は、アプリ独自の契約がある場合を除き framework default に委ね、通常の endpoint 定義では過剰に明示しない。
    `care_status` のような補助状態は、主 status と別カラムで扱い、候補除外や invalid 化の主制御には使わない。

servers:
  - url: http://localhost:8000
    description: ローカル開発環境

tags:
  - name: Auth
    description: 認証・セッション関連 API
  - name: ReferenceMasters
    description: 参照マスタ API
  - name: Settings
    description: 設定関連 API
  - name: Items
    description: アイテム関連 API
  - name: Outfits
    description: コーディネート関連 API
  - name: Wear Logs
    description: wear logs 関連 API
  - name: Purchase Candidates
    description: purchase_candidates 関連 API

paths:
  /csrf-cookie:
    get:
      tags:
        - Auth
      summary: CSRFトークンとセッションCookieを発行する
      description: |
        CSRF保護が必要な API を呼ぶ前に実行する。
        XSRF-TOKEN とセッションCookie を Cookie に設定する。
      operationId: getCsrfCookie
      responses:
        "204":
          description: レスポンスボディなし
          headers:
            Set-Cookie:
              description: "XSRF-TOKEN とセッションCookie が設定される"
              schema:
                type: string

  /api/register:
    post:
      tags:
        - Auth
      summary: ユーザー登録
      description: |
        新規ユーザーを登録し、成功時はそのままログイン状態にする。
        Cookie ベース認証のため、事前に /csrf-cookie を呼び出し X-CSRF-TOKEN を付与する。
      operationId: register
      parameters:
        - $ref: "#/components/parameters/XCsrfTokenHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: ユーザー登録成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResponse"
        "422":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

  /api/settings/brands:
    get:
      tags:
        - Settings
      summary: ブランド候補一覧取得
      description: ユーザー単位のブランド候補を返す。active_only と keyword で絞り込みでき、item 新規作成 / 編集のブランド候補サジェストにも利用する。
      security:
        - SessionCookieAuth: []
      parameters:
        - in: query
          name: active_only
          schema:
            type: boolean
          description: true のとき有効な候補だけ返す
        - in: query
          name: keyword
          schema:
            type: string
            maxLength: 255
          description: ブランド名または読み仮名で候補を絞り込む
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserBrandsResponse"
        "401":
          description: 未認証
    post:
      tags:
        - Settings
      summary: ブランド候補追加
      description: ブランド候補を user 単位で追加する。重複判定は backend 側で行う。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/XCsrfTokenHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserBrandUpsertRequest"
      responses:
        "201":
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserBrandResponseWithMessage"
        "401":
          description: 未認証
        "422":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

  /api/settings/brands/{id}:
    patch:
      tags:
        - Settings
      summary: ブランド候補更新
      description: ブランド候補の名称・読み仮名・有効状態を更新する。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/XCsrfTokenHeader"
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserBrandUpdateRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserBrandResponseWithMessage"
        "401":
          description: 未認証
        "404":
          description: 未検出（対象なし・他人データ秘匿を含む）
        "422":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

  /api/login:
    post:
      tags:
        - Auth
      summary: ログイン
      description: |
        メールアドレスとパスワードでログインする。
        Cookie ベース認証のため、事前に /csrf-cookie を呼び出し X-CSRF-TOKEN を付与する。
      operationId: login
      parameters:
        - $ref: "#/components/parameters/XCsrfTokenHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: ログイン成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "422":
          description: 認証失敗またはバリデーションエラー。認証失敗は message only、入力不備は errors を含む
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/UnprocessableEntityMessageResponse"
                  - $ref: "#/components/schemas/ValidationErrorResponse"

  /api/me:
    get:
      tags:
        - Auth
      summary: ログインユーザー情報取得
      operationId: me
      security:
        - SessionCookieAuth: []
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: 未認証

  /api/logout:
    post:
      tags:
        - Auth
      summary: ログアウト
      description: |
        ルート定義は auth:web 配下に置くが、未認証で /api/logout を呼んだ場合も例外ハンドラ側で logged_out を返す。
        POST のため X-CSRF-TOKEN ヘッダが必要。
      operationId: logout
      parameters:
        - $ref: "#/components/parameters/XCsrfTokenHeader"
      responses:
        "200":
          description: "ログアウト成功。message は `logged_out`、認証状態の正本は Cookie と後続の `/api/me` で確認する"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageOnlyResponse"

  /api/categories:
    get:
      tags:
        - ReferenceMasters
      summary: カテゴリ一覧取得
      description: 参照マスタとしてカテゴリ一覧を返す。実装は api/routes/api.php 側に定義されている。
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoriesResponse"

  /api/settings/categories:
    get:
      tags:
        - Settings
      summary: カテゴリ表示設定取得
      security:
        - SessionCookieAuth: []
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryVisibilitySettingsResponse"
        "401":
          description: 未認証
    put:
      tags:
        - Settings
      summary: カテゴリ表示設定更新
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/XCsrfTokenHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryVisibilitySettingsRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryVisibilitySettingsUpdatedResponse"
        "401":
          description: 未認証
        "422":
          description: バリデーションエラーまたは業務ルール違反。field error がある場合は errors を含み、無効カテゴリなどの業務ルール違反は message only を返す
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ValidationErrorResponse"
                  - $ref: "#/components/schemas/UnprocessableEntityMessageResponse"

  /api/settings/preferences:
    get:
      tags:
        - Settings
      summary: 表示・初期値設定取得
      description: "`currentSeason` と `defaultWearLogStatus` と `calendarWeekStart` と `skinTonePreset` を返す。前者3つの未設定時は null を返し、`skinTonePreset` は `neutral_medium` を返す。"
      security:
        - SessionCookieAuth: []
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferencesResponse"
        "401":
          description: 未認証
    put:
      tags:
        - Settings
      summary: 表示・初期値設定更新
      description: |
        item / outfit 一覧の初期季節と、wear log 新規作成時の初期 status と、wear log カレンダーの週開始と、item サムネイル用の肌色 preset を更新する。
        一覧では URL の季節条件が優先され、URL に季節指定がない場合のみ `currentSeason` を初期値として使う。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/XCsrfTokenHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserPreferencesRequest"
      responses:
        "200":
          description: "更新成功。message は `updated`、正本は同時に返す preferences と後続の設定取得結果で読む"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferencesUpdatedResponse"
        "401":
          description: 未認証
        "422":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

  /api/settings/tpos:
    get:
      tags:
        - Settings
      summary: TPO 設定一覧取得
      description: |
        現在のユーザーが持つ TPO 一覧を `sort_order asc` で返す。
        `active_only=1` を指定した場合は active な TPO のみ返す。
        settings 管理画面の正本とし、item / outfit の新規候補取得にも使う。
      security:
        - SessionCookieAuth: []
      parameters:
        - name: active_only
          in: query
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserTposResponse"
        "401":
          description: 未認証
    post:
      tags:
        - Settings
      summary: TPO 追加
      description: |
        ユーザー追加 TPO を新規作成する。
        作成時は `isActive=true`、`isPreset=false`、`sortOrder` は末尾自動採番とする。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/XCsrfTokenHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserTpoRequest"
      responses:
        "201":
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserTpoResponseWithMessage"
        "401":
          description: 未認証
        "422":
          description: バリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

  /api/settings/tpos/{id}:
    patch:
      tags:
        - Settings
      summary: TPO 更新
      description: |
        TPO の名称、active 状態、表示順を更新する。
        プリセット TPO の名称変更はできない。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/XCsrfTokenHeader"
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserTpoRequest"
      responses:
        "200":
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserTpoResponseWithMessage"
        "401":
          description: 未認証
        "404":
          description: 対象なし
        "422":
          description: バリデーションエラーまたは業務ルール違反
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

  /api/export:
    get:
      tags:
        - Settings
      summary: バックアップファイル取得
      description: |
        ログイン中のユーザーのアイテム・購入検討・コーディネート・着用履歴を、
        import 用 JSON として返す。
        item / candidate 画像は Base64 を含むため payload は大きくなる場合がある。
      security:
        - SessionCookieAuth: []
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportExportBackupPayload"
        "401":
          description: 未認証

  /api/import:
    post:
      tags:
        - Settings
      summary: バックアップファイル復元
      description: |
        ログイン中のユーザーのアイテム・購入検討・コーディネート・着用履歴を
        バックアップ JSON から復元する。
        復元前に現在ユーザーの対象データを削除し、item / outfit / wear log 参照は新しい ID に張り替える。
        owner.user_id はバックアップ作成元のメタデータとして扱い、現在ユーザーとの一致は必須にしない。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/XCsrfTokenHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportExportBackupPayload"
      responses:
        "200":
          description: 復元成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportExecutionResponse"
        "401":
          description: 未認証
        "422":
          description: バリデーションエラーまたは復元失敗
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

  /api/items:
    get:
      tags:
        - Items
      summary: アイテム一覧取得
      description: |
        通常一覧に表示する status=active の item を返す。
        top-level category `underwear` は通常一覧では返さず、
        アンダーウェア専用一覧では `storage=underwear` を使う。
        response 形式は items 配列と meta.total / meta.totalAll /
        meta.page / meta.lastPage を含む。
      security:
        - SessionCookieAuth: []
      parameters:
        - name: storage
          in: query
          required: false
          schema:
            type: string
            enum: [underwear]
          description: "'underwear' 指定時はアンダーウェア一覧として取得する。"
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemsResponse"
        "401":
          description: 未認証
    post:
      tags:
        - Items
      summary: アイテム作成
      description: |
        通常の item 作成に加えて、purchase_candidate_id を渡した場合は
        Laravel 側で item 作成、candidate 由来画像の item 用保存先への物理コピー、
        candidate の status=purchased 更新、converted_item_id / converted_at 更新を
        同じ transaction で処理する。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/XCsrfTokenHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemCreateRequest"
      responses:
        "201":
          description: "作成成功。message は `created`、item には作成後 record を含む"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemResponseWithMessage"
        "401":
          description: 未認証
        "422":
          description: バリデーションエラーまたは業務ルール違反。更新項目なしは message only、field 単位の不備は errors を含む
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ValidationErrorResponse"
                  - $ref: "#/components/schemas/UnprocessableEntityMessageResponse"

  /api/items/disposed:
    get:
      tags:
        - Items
      summary: 手放したアイテム一覧取得
      description: |
        `status=disposed` の item だけを返す dedicated 一覧。
        top-level category `underwear` は通常の手放したアイテム一覧では返さず、
        アンダーウェア専用一覧では `storage=underwear` を使う。
        通常の `/api/items` と責務を分け、手放した item の確認と詳細遷移を主目的にする。
        response 形式は items 配列と meta.total / meta.totalAll / meta.page / meta.lastPage を含む。
      security:
        - SessionCookieAuth: []
      parameters:
        - name: storage
          in: query
          required: false
          schema:
            type: string
            enum: [underwear]
          description: "'underwear' 指定時は手放したアンダーウェア一覧として取得する。"
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemsResponse"
        "401":
          description: 未認証

  /api/home/summary:
    get:
      tags:
        - Home
      summary: ホーム件数取得
      description: |
        ホーム画面向けの軽量 summary。
        一覧 API の payload や filter / sort / paginate / thumbnail 生成は行わず、
        現在の一覧の初期母数に揃えた件数だけを返す。
      security:
        - SessionCookieAuth: []
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HomeSummaryResponse"
        "401":
          description: 未認証

  /api/items/{id}:
    get:
      tags:
        - Items
      summary: アイテム詳細取得
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ItemIdPath"
      responses:
        "200":
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemResponse"
        "401":
          description: 未認証
        "404":
          description: 未検出（対象なし・他人データ秘匿を含む）
    put:
      tags:
        - Items
      summary: アイテム更新
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ItemIdPath"
        - $ref: "#/components/parameters/XCsrfTokenHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ItemUpsertRequest"
      responses:
        "200":
          description: "更新成功。message は `updated`、item には更新後 record を含む"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemResponseWithMessage"
        "401":
          description: 未認証
        "404":
          description: 未検出（対象なし・他人データ秘匿を含む）
        "422":
          description: バリデーションエラーまたは業務ルール違反。field 単位の不備は errors を含み、選択 item 不正などは message only を返す
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ValidationErrorResponse"
                  - $ref: "#/components/schemas/UnprocessableEntityMessageResponse"
    delete:
      tags:
        - Items
      summary: アイテム物理削除
      description: |
        item record を物理削除する例外導線。
        通常の所有状態変更は `dispose` / `reactivate` を使い、通常 UI では `disposed` を中心に扱う。
        `outfit_items` や `wear_log_items` から参照されている item は物理削除せず、`disposed` への状態変更を優先する。
        response は message のみを返し、削除結果の正本は後続の一覧 / 詳細取得結果で確認する。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ItemIdPath"
        - $ref: "#/components/parameters/XCsrfTokenHeader"
      responses:
        "200":
          description: "削除成功。message は `deleted`"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageOnlyResponse"
        "401":
          description: 未認証
        "404":
          description: 未検出（対象なし・他人データ秘匿を含む）
        "422":
          description: 参照中 item のため物理削除できない。通常は `disposed` を使う

  /api/items/{id}/images:
    post:
      tags:
        - Items
      summary: アイテム画像追加
      description: |
        item に画像を追加する。
        画像は item 用保存先へ保存し、item_images として candidate 側とは別管理にする。
        現時点では JPEG / PNG / WebP、5MB 以下、最大 5 枚を想定する。
        既存画像の並び替えと代表画像切り替えは PUT /api/items/{id} の images payload で更新する。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ItemIdPath"
        - $ref: "#/components/parameters/XCsrfTokenHeader"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - image
              properties:
                image:
                  type: string
                  format: binary
                sort_order:
                  type: integer
                  minimum: 1
                is_primary:
                  type: boolean
      responses:
        "201":
          description: 追加成功
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                  - image
                properties:
                  message:
                    type: string
                    example: created
                  image:
                    $ref: "#/components/schemas/ItemImageRecord"
        "401":
          description: 未認証
        "404":
          description: 未検出（対象なし・他人データ秘匿を含む）
        "422":
          description: バリデーションエラーまたは業務ルール違反。field 単位の不備は errors を含み、選択 item 不正などは message only を返す
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ValidationErrorResponse"
                  - $ref: "#/components/schemas/UnprocessableEntityMessageResponse"

