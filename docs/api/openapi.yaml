        - $ref: "#/components/parameters/ItemIdPath"
        - $ref: "#/components/parameters/XCsrfTokenHeader"
      responses:
        "200":
          description: "変更成功。message は `reactivated`、item には状態変更後 record を含む"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemResponseWithMessage"
        "401":
          description: 未認証
        "404":
          description: 未検出（対象なし・他人データ秘匿を含む）
        "422":
          description: 変更不可またはバリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

  /api/items/{id}/care-status:
    post:
      tags:
        - Items
      summary: アイテムのケア状態を更新
      description: |
        item の補助状態 `care_status` を更新する。
        現状の実装の許可値は `in_cleaning` のみで、`null` は補助状態なしを表す。
        `care_status` はバッジ表示・警告・解除導線に使い、候補除外や invalid 化の主制御には使わない。
        response には更新後の item を含む。
      security:
        - SessionCookieAuth: []
      parameters:
        - $ref: "#/components/parameters/ItemIdPath"
        - $ref: "#/components/parameters/XCsrfTokenHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
