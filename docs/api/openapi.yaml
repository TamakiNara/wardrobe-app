          description: "変更成功。message は `disposed`、item には状態変更後 record を含む"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ItemResponseWithMessage"
        "401":
          description: 未認証
        "404":
          description: 未検出（対象なし・他人データ秘匿を含む）
        "422":
          description: 変更不可またはバリデーションエラー
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"

  /api/items/{id}/reactivate:
    post:
      tags:
        - Items
      summary: アイテムを active に戻す
      description: |
        item を active に戻すが、関連 outfit は自動 restore しない。
        通常の ItemUpsertRequest とは分けて扱う。
        response には更新後の item を含む。
      security:
        - SessionCookieAuth: []
