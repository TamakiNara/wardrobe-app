          type: string
          nullable: true
          description: "`jma_forecast_region_code` に対応する JMA 府県予報区コード。forecast JSON の取得 URL に使う。"
        latitude:
          type: number
          nullable: true
          description: Open-Meteo forecast / historical 用の緯度。longitude とセットで扱う。
        longitude:
          type: number
          nullable: true
          description: Open-Meteo forecast / historical 用の経度。latitude とセットで扱う。
        timezone:
          type: string
          nullable: true
          description: Open-Meteo の daily 集計基準になるタイムゾーン。日本国内では通常 Asia/Tokyo。
        is_default:
          type: boolean
        display_order:
          type: integer
          minimum: 1

    WeatherLocationMutationResponse:
      allOf:
        - $ref: "#/components/schemas/MessageOnlyResponse"
        - type: object
          required:
            - location
          properties:
            location:
              $ref: "#/components/schemas/WeatherLocationRecord"

    WeatherRecord:
      type: object
      required:
        - id
        - weather_date
        - location_id
        - location_name
        - location_name_snapshot
        - weather_code
        - source_type
        - source_name
      properties:
        id:
          type: integer
        weather_date:
          type: string
          format: date
        location_id:
          type: integer
          nullable: true
        location_name:
          type: string
        location_name_snapshot:
          type: string
        forecast_area_code_snapshot:
          type: string
          nullable: true
          description: 保存時点の予報API用地域コード snapshot。MVPでは weather.tsukumijima.net の city code を主対象とする。
        weather_code:
          $ref: "#/components/schemas/WeatherCode"
        temperature_high:
          type: number
          nullable: true
        temperature_low:
          type: number
          nullable: true
        memo:
          type: string
          nullable: true
        source_type:
          $ref: "#/components/schemas/WeatherSourceType"
        source_name:
          type: string
        source_fetched_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
          nullable: true
        updated_at:
          type: string
          format: date-time
          nullable: true

    WeatherRecordsResponse:
      type: object
      required:
        - weatherRecords
      properties:
        weatherRecords:
          type: array
          items:
            $ref: "#/components/schemas/WeatherRecord"

    WeatherRecordUpsertRequest:
      type: object
      required:
        - weather_date
        - weather_code
      properties:
        weather_date:
          type: string
          format: date
        location_id:
          type: integer
          nullable: true
        location_name:
          type: string
          nullable: true
        save_location:
          type: boolean
        weather_code:
          $ref: "#/components/schemas/WeatherCode"
        temperature_high:
          type: number
          nullable: true
        temperature_low:
          type: number
          nullable: true
        memo:
          type: string
          nullable: true
        source_type:
          $ref: "#/components/schemas/WeatherSourceType"
        source_name:
          type: string
          nullable: true
          description: |
            手入力のみの場合は `manual`、予報取得結果を反映して保存する場合は
            `tsukumijima` または `jma_forecast_json`。
        source_fetched_at:
          type: string
          format: date-time
          nullable: true
          description: |
            `source_type = forecast_api` のときは取得時刻を入れる。手入力のみの場合は null。

    WeatherForecastRequest:
      type: object
      required:
        - weather_date
        - location_id
      properties:
        weather_date:
          type: string
          format: date
        location_id:
          type: integer
          description: JMA コードまたは legacy forecast_area_code を持つ保存済み地域 ID

    WeatherForecast:
      type: object
      required:
        - weather_date
        - location_id
        - location_name
        - weather_code
        - source_type
        - source_name
        - source_fetched_at
      properties:
        weather_date:
          type: string
          format: date
        location_id:
          type: integer
        location_name:
          type: string
        forecast_area_code:
          type: string
          nullable: true
          description: weather.tsukumijima.net fallback 用の legacy city code。JMA 取得時は null を返してよい。
        weather_code:
          $ref: "#/components/schemas/WeatherCode"
        temperature_high:
          type: integer
          nullable: true
        temperature_low:
          type: integer
          nullable: true
        source_type:
          type: string
          enum: [forecast_api]
        source_name:
          type: string
          description: manual / tsukumijima / jma_forecast_json などの source 名
          example: jma_forecast_json
        source_fetched_at:
          type: string
          format: date-time
        raw_telop:
          type: string
          nullable: true
          description: 変換元 telop。DB 保存はしない。frontend では `other` になった理由を確認できるよう取得後表示してよい。

    WeatherForecastResponse:
      allOf:
        - $ref: "#/components/schemas/MessageOnlyResponse"
        - type: object
          required:
            - forecast
          properties:
            forecast:
              $ref: "#/components/schemas/WeatherForecast"

    WeatherRecordMutationResponse:
      allOf:
        - $ref: "#/components/schemas/MessageOnlyResponse"
        - type: object
          required:
            - weatherRecord
          properties:
            weatherRecord:
              $ref: "#/components/schemas/WeatherRecord"

  securitySchemes:
    SessionCookieAuth:
      type: apiKey
      in: cookie
      name: laravel-session
