          type: integer
          nullable: true
          example: 10
          description: group_order 最小、同値または null がある場合は id で安定化した代表 candidate ID。candidate payload がない不正な group の場合のみ null。
        candidates:
          type: array
          description: 現在の filter に一致した同一 group 内 candidates。group 内は group_order asc, id asc で返す。
          items:
            $ref: "#/components/schemas/PurchaseCandidateListItem"

    PurchaseCandidateListEntry:
      oneOf:
        - $ref: "#/components/schemas/PurchaseCandidateSingleListEntry"
        - $ref: "#/components/schemas/PurchaseCandidateGroupListEntry"
      discriminator:
        propertyName: type
        mapping:
          single: "#/components/schemas/PurchaseCandidateSingleListEntry"
          group: "#/components/schemas/PurchaseCandidateGroupListEntry"

    PurchaseCandidateListResponse:
      type: object
      required:
        - purchaseCandidateEntries
        - meta
      properties:
        purchaseCandidateEntries:
          type: array
          description: 一覧表示の正本 payload。単独 candidate は single、同じ group_id を持つ candidates は group として返す。
          items:
            $ref: "#/components/schemas/PurchaseCandidateListEntry"
        availableBrands:
          type: array
          description: 実装が返す場合に filter UI で使うブランド候補。
          items:
            type: string
        meta:
          type: object
          required:
            - total
            - totalAll
            - per_page
            - current_page
            - page
            - lastPage
          properties:
            total:
              type: integer
              example: 12
              description: filter 後の表示カード数。candidate 件数ではなく、group は 1 カードとして数える。
            totalAll:
              type: integer
              example: 20
              description: filter 前の全 candidate 件数、または空状態判定用の全 candidate 件数。表示カード数ではない。
            per_page:
              type: integer
              example: 8
              description: 1ページあたりの表示カード数。
            current_page:
              type: integer
              example: 1
              description: 表示カード単位の現在ページ。
            page:
              type: integer
              example: 1
              description: 表示カード単位の現在ページ。current_page と同じ意味で扱う。
            lastPage:
              type: integer
              example: 2
              description: 表示カード数 total と per_page から算出した最終ページ。

